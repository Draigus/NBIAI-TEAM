[build]
builder = "nixpacks"
buildCommand = "npm install && npm run build && cd client && npm install && npm run build"

[deploy]
# Run drizzle migrations before the server starts. Migrations are
# idempotent (tracked in the drizzle.__drizzle_migrations table) so
# this is safe on every boot, including redeploys with no schema
# change.
startCommand = "node dist/db/migrate.js && node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "nbiai-app"

[services.variables]
PORT = "3000"
NODE_ENV = "production"
