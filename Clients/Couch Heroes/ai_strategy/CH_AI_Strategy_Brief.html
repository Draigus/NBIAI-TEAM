{d:'qa',name:'modl.ai',vendor:'modl.ai',v:'pilot',comp:6.4,sc:[9,5,8,3,7,4],bgc:'#00C896',img:'https://cdn.sanity.io/images/dfcxr503/production/db2d3e854270cbd2c8b174c03088453577e96b3d-1024x1024.png',co:'modl.ai. Founded ~2018, Copenhagen. ~18 employees. No new funding since 2022. CEO quoted $2,500/month in 2022 (pricing may be outdated). Die Gute Fabrik is both customer and minority investor.',desc:'AI playtesting bots: regression testing, exploit detection, balance testing, crash detection. 10,000+ simulated play-hours per cycle. UE5 plugin. Bots learn game mechanics and explore autonomously, covering terrain and edge cases that manual testing cannot match at scale. Frees human QA for testing that bots cannot do: subjective feel, emotional pacing, accessibility.',ev:'Die Gute Fabrik (Saltsea Chronicles / Take-Two). Rare built an equivalent in-house framework for Sea of Thieves; modl.ai is the commercial alternative for studios without that engineering capacity. Limited but genuine evidence. ~64% of entire AI budget.',rat:'Highest-impact tool for constrained QA capacity. At ~$60,000 estimated (~64% of total AI budget), pricing MUST be confirmed directly with modl.ai before any commitment. 18 employees and no new funding since 2022 is a vendor risk. Adoption score of 3 reflects significant evaluation overhead. PILOT contingent on QA capacity expansion.',cpre:'~$60,000 (estimated)',cpost:'~$30,000/yr (estimated)',founded:'~2018',emp:'~18',fund:'Undisclosed',url:'modl.ai'},
{d:'qa',name:'GameDriver',vendor:'GameDriver',v:'watch',comp:6.2,sc:[6,5,8,5,7,6],bgc:'#10B981',co:'GameDriver. Quality-as-a-Service for game studios. ~9 employees across North America and Europe. Supports Unity, Unreal, Godot, Frostbite, and Snowdrop.',desc:'Managed test execution layer that augments QA teams. Test Assistant: standalone tool for developing and debugging test scripts regardless of engine expertise. AI integration via local MCP server connects to Claude for AI-assisted test script writing. UE5 integration with Unreal Automated Testing Framework, including Blueprint support. GDC 2025 exhibitor. Transparent pricing model.',ev:'GDC 2025 showcase (San Francisco). Integration with multiple engines including Frostbite and Snowdrop suggests large studio relationships. No specific shipped game title confirmed publicly. AI-assisted test writing via MCP is forward-looking but requires integration investment.',rat:'WATCH. Complementary to modl.ai: GameDriver handles functional/regression testing while modl.ai handles autonomous exploration. MCP integration for AI-assisted test script writing is architecturally sound. ~9 employees is a small team but focused on a specific niche. Revisit when modl.ai PILOT is underway; evaluate GameDriver for complementary coverage.',cpre:'$0',cpost:'$0',founded:'~2018',emp:'~9',fund:'Undisclosed',url:'gamedriver.ai'},
{d:'qa',name:'ManaMind',vendor:'ManaMind',v:'watch',comp:5.0,sc:[7,2,7,3,5,5],bgc:'#8B5CF6',co:'ManaMind. Founded by Emil Kostadinov and Sabtain Ahmad, London. $1.5M pre-seed (April 2026, led by Sure Valley). Very early stage.',desc:'Autonomous AI agents for game testing that connect to game builds through a defined API. Agents follow scripted test plans, explore semi-randomly within constraints, and report interactions producing unexpected states. Claims: agents complete in six hours what manual QA takes days. Requires significant integration (expose game actions through API, define valid/invalid states). Setup can take days for complex systems.',ev:'Pre-seed stage (April 2026). No shipped game, no public customer. Claims of 6-hour test cycles replacing days of manual work are unverified. The platform is in active development following their pre-seed round.',rat:'WATCH. Too early for any recommendation: $1.5M pre-seed, no customers, no production evidence. The approach (API-connected autonomous agents) is architecturally sound and addresses a real problem. Monitor for 12 months. Revisit Q2 2027 if the company demonstrates customer traction and production results.',cpre:'$0',cpost:'$0',founded:'~2024',emp:'~5-10',fund:'$1.5M pre-seed',url:'manamind.ai'},

// ── NARRATIVE (6) ──
{d:'narrative',name:'Charisma.ai',vendor:'Charisma Entertainment',v:'watch',comp:5.7,sc:[7,4,6,4,6,7],bgc:'#E11D48',img:'https://charisma.ai/_next/image?url=%2F_next%2Fstatic%2Fmedia%2Fbanner.28854ad3.png&w=3840&q=75',co:'Charisma Entertainment Ltd. Founded ~2015, Oxford, UK. CEO Guy Gadney (BBC, Penguin Books). ~15-18 employees. $2M ARR. ~$650K raised. CRITICAL: CTO departed Jan 2024. CEO launched separate company "Charismatic.ai" for microdramas (June 2025). CBInsights Mosaic score dropped 41 points. Valuation $5.9M (self-reported).',desc:'Graph-based visual story editor (no-code) with 13 node types. Hybrid model: scripted narrative paths plus LLM-powered improvisation (Claude/GPT/Llama, 150 token cap on improvisation). Emotion Engine with 12 emotional states (Ekman model), mood and relationship tracking. Memory system: 5 types (word, sentence, decision, counter, boolean). 1,000+ TTS voices via multiple providers. UE5 SDK (MIT licence, open source on GitHub). The most controllable NPC dialogue approach evaluated.',ev:'Sky (3+ projects, TV/media not games). BBC R&D pilots. Warner Bros: Steppenwolf at SXSW 2022 (conference demo). DreamWorks: Mama Luna\'s Cat Rescue (DVD tie-in). Their own game The Kraken Wakes: 56/100 Steam score, 18 reviews, 20-50K owners. Epic MegaGrant recipient (2022). Keywords Studios channel partnership (Feb 2024). No confirmed AAA game shipped.',rat:'WATCH. Highest composite among NPC tools due to controllable hybrid model (scripted + bounded LLM improvisation). But: CTO departed, CEO focus splitting across two companies, declining stability indicators, no shipped game. The UE5 SDK being MIT-licensed reduces vendor lock-in risk. Revisit Q2 2027 if stability improves, a shipped game uses it, and SAG-AFTRA compliance is clarified.',cpre:'$0',cpost:'$0',founded:'~2015',emp:'~15-18',fund:'~$650K',url:'charisma.ai'},
{d:'narrative',name:'Inworld AI',vendor:'Inworld',v:'watch',comp:4.7,sc:[5,4,5,3,7,5],bgc:'#8B5CF6',co:'Founded ~2021, Mountain View. CEO Kylan Gibbs (ex-Google Dialogflow, ex-DeepMind). $120-133M raised. $500M valuation (Aug 2023 Series B, Lightspeed). No new funding since. ~107 employees. SOC 2 Type II, GDPR, HIPAA compliant.',desc:'Real-time AI NPCs with custom SpeechLM (neural audio codec + LLM), Realtime TTS-2 (sub-200ms latency), 220+ model routing. UE5 multi-plugin SDK, Unity SDK, Node.js SDK. Previously hosted copyrighted character chatbots (Nintendo, Pokemon, Sony IP) before takedowns, raising IP governance questions. Pricing: On-Demand free ($25/1M chars TTS), Creator $25/mo through Enterprise custom.',ev:'Xbox/Microsoft multi-year partnership (Nov 2023): no visible output. GDC demos with Ubisoft, NVIDIA: prototypes only. NetEase, Niantic: all appear demo/prototype stage. The npc.ai product has been taken down. Homepage barely mentions games. No confirmed shipped commercial game.',rat:'WATCH. Was the best-funded, best-known NPC AI company but has repositioned toward general voice AI infrastructure, deprioritising game-specific features. Capability scored at 5 (not higher) because the product roadmap is no longer optimised for game NPCs. This is the most significant finding in the narrative assessment: the category leader has broadened its focus. Revisit Q4 2027 only if Inworld recommits to gaming with a dedicated product and a shipped title.',cpre:'$0',cpost:'$0',founded:'~2021',emp:'~107',fund:'$120-133M',url:'inworld.ai'},
{d:'narrative',name:'Convai',vendor:'Convai',v:'watch',comp:4.9,sc:[6,3,5,3,6,7],bgc:'#3B82F6',co:'Founded April 2022, San Jose. CEO Purnendu Mukherjee (ex-NVIDIA, built first 3D avatar chatbot). $5M seed (Dec 2022, Dune Ventures). ~41-43 employees. $6.5M ARR reported (unverified). ISO 27001.',desc:'Real-time conversational AI NPCs with Knowledge Bank (RAG), Scene Perception (3D spatial awareness), long-term memory, NPC-to-NPC interaction, and action callbacks. 65+ languages, 500+ voices. NVIDIA ACE integration. Cloud-only on standard plans. Hidden pricing: Indie Dev tier advertises 3,000 interactions but only 1,500 use the flagship LLM; rest auto-downgrade to cheaper model.',ev:'Second Life (Linden Lab): Character Designer alpha (Dec 2024). Stormgate (Frost Giant): "exploring" AI characters, GDC 2024 demo. No confirmed shipped game. Community: ~3,137 Discord members. Persistent technical issues: 8-10 second latency documented since Jan 2025. SDK 3.6.9-hotfix-2 broke long-term memory. "Good platform, unstable backend" (2026 user review).',rat:'WATCH. Persistent 8-10s latency is disqualifying for an MMO where NPC interactions must feel responsive. Production Readiness of 3 triggers sensitivity floor. For an MMO where players will not wait 8-10 seconds for an NPC response, the latency alone rules out any recommendation. Revisit Q2 2027 if latency drops below 2s and backend stability improves.',cpre:'$0',cpost:'$0',founded:'2022',emp:'~41-43',fund:'$5M',url:'convai.com'},
{d:'narrative',name:'NVIDIA ACE Game Agent SDK',vendor:'NVIDIA',v:'watch',comp:7.1,sc:[8,6,9,4,8,7],bgc:'#76B900',img:'https://developer.download.nvidia.com/images/ace-for-gamedev/Hiroki1.png',co:'NVIDIA Corporation (NASDAQ: NVDA). ACE Game Agent SDK: open-source C/C++ framework. Beta released at Unreal Fest 2026 with UE5 plugins. On-device inference eliminates cloud latency.',desc:'On-device AI companion and NPC framework with Agent API (stateful chat, multi-step reasoning), Chat API (direct inference control), and RAG API (retrieval from developer databases). UE5 plugins for live transcription, dynamic character dialogue, voice commands, and contextual action responses. Chatterbox Turbo 350M TTS model included. No cloud dependency: all inference runs on local NVIDIA GPU. Open-source.',ev:'PUBG: BATTLEGROUNDS (Krafton): AI companion integration. Total War: PHARAOH (Creative Assembly). These are confirmed production deployments, not demos. NVIDIA backing provides unmatched stability. The SDK approach means NVIDIA provides the building blocks; studios build the NPC system on top.',rat:'WATCH. The most architecturally promising NPC AI approach: open-source, on-device (no latency, no data egress, no per-query cost), with UE5 plugins and confirmed AAA adoption. But it is an SDK, not a plug-and-play tool; requires significant engineering to build a complete NPC dialogue system. Requires NVIDIA GPU hardware. Evaluate when engineering capacity exists to build on top of the SDK.',cpre:'$0',cpost:'$0',founded:'2024 (ACE SDK); 1993 (NVIDIA)',emp:'~30,000+ (NVIDIA)',fund:'Public ($3T+ mkt cap)',url:'developer.nvidia.com/ace'},
{d:'narrative',name:'memoQ',vendor:'Kilgray',v:'watch',comp:7.3,sc:[7,8,9,6,6,6],bgc:'#2563EB',co:'Kilgray Translation Technologies (memoQ Zrt.). Founded 2004, Budapest. Translation management system with AI-assisted translation, translation memory, term bases, and QA checks. Gaming Bundle includes Gridly (game string management) and Voiseed (AI voice localisation) integrations.',desc:'Professional translation management system with Adaptive Generative Translation (AI-based translation automation), AI-based quality estimation (AIQE), translation memory, and terminology management. Gaming Bundle includes integration with Gridly for game string management. Pricing: Translator Pro from ~$30-44/mo; server licences for teams higher.',ev:'Gameloft: 30% productivity boost in localisation workflows (case study). Epic Games: confirmed user. Industry standard in professional translation across gaming, software, and enterprise. November 2025: full integration with Revoiceit by Voiseed for AI voice localisation (SAG-AFTRA compliance required for voice).',rat:'WATCH (timing, not quality). Both memoQ and Phrase score well and should be evaluated competitively when localisation planning begins (~mid-2027). memoQ has the edge on gaming-specific features (Gridly integration, Gaming Bundle). Evaluate based on: (a) integration with string management pipeline, (b) pricing at studio scale, (c) linguist network compatibility.',cpre:'$0',cpost:'$0 (Year 2+: ~$5K-15K/yr)',founded:'2004',emp:'~100-150',fund:'Undisclosed',url:'memoq.com'},
{d:'narrative',name:'Phrase TMS',vendor:'Phrase (ex-Memsource)',v:'watch',comp:7.1,sc:[7,8,9,6,6,4],bgc:'#4F46E5',co:'Phrase (formerly Memsource). Founded 2010, Prague. Acquired by Phrase 2022. Cloud-based TMS with AI translation, quality estimation, and workflow automation.',desc:'Cloud-based translation management system with AI-powered translation, quality estimation, and workflow automation. Strong in gaming localisation with established integrations. Bohemia Interactive, GameHouse, Mixi confirmed as gaming customers. From ~$525/mo for team plans. Higher cost than memoQ at team tier.',ev:'Bohemia Interactive, GameHouse, Mixi. Strong in gaming localisation. The cost difference vs memoQ (Cost Efficiency 4 vs 6) reflects higher team-tier pricing. Functionally equivalent to memoQ; the difference is pricing and linguist network compatibility.',rat:'WATCH (timing, not quality). Within 0.2 composite of memoQ. Evaluate competitively when localisation planning begins (~mid-2027). Selection criteria: (a) integration with UE5 string pipeline, (b) pricing at studio scale (Phrase is more expensive), (c) which tool the localisation vendor prefers.',cpre:'$0',cpost:'$0 (Year 2+: ~$6.3K+/yr)',founded:'2010',emp:'~200+',fund:'Undisclosed',url:'phrase.com'},

{d:'production',name:'Claude for Teams',vendor:'Anthropic',v:'pilot',comp:7.6,sc:[8,9,6,8,5,9],bgc:'#D97706',co:'Anthropic. Claude for Teams: $25/seat/month (monthly) or $20/seat/month (annual). Minimum 5 seats. Team Premium at $100/seat/month (annual) includes Claude Code. Enterprise tier adds SSO, audit logs, custom data-retention controls.',desc:'General-purpose AI platform serving Finance, HR, Marketing, and Production functions. February 2026 introduced dedicated finance plugins (financial analysis, equity research, wealth management) and HR plugin (employee lifecycle from offer letters to compensation analyses). Cowork feature executes multi-step file-level tasks independently. This is the practical alternative for every business discipline where specialist tools are either $150K+ (Harvey), blocked by regulation (HireVue), or non-existent. CRITICAL: requires strict data classification before deployment.',ev:'Millions of business users across enterprise. The February 2026 plugins are purpose-built for business functions, not repurposed general features. At $20-25/seat/month for a 70-person studio, total annual cost (~$16,800-21,000) is roughly 1/7th of Harvey alone. Comparable alternatives: ChatGPT Enterprise/Teams ($25-30/seat, similar capabilities, different model strengths).',rat:'PILOT with CRITICAL data classification prerequisite. Three tiers must be enforced: Tier 1 SAFE (job descriptions, meeting summaries, marketing copy, sprint planning, general research, policy template drafting). Tier 2 ENTERPRISE AGREEMENT REQUIRED (contract review for non-partner-IP, financial analysis excluding cap table, aggregated HR analytics). Tier 3 PROHIBITED (cap table, investor correspondence, employee disciplinary/health records under GDPR Article 9, partner IP contracts, unreleased game lore, economy design specifics). Without data classification, this recommendation becomes a liability. The governance prerequisite is non-negotiable.',cpre:'~$16,800-21,000 (70 seats)',cpost:'~$16,800-21,000/yr',founded:'2021',emp:'Private company',fund:'Private (well-funded)',url:'claude.ai'},

// ── MARKETING (2) ──
{d:'marketing',name:'ToxMod',vendor:'Modulate',v:'watch',comp:7.7,sc:[8,9,8,7,7,5],bgc:'#10B981',img:'https://cdn.prod.website-files.com/67ed675f8e30d86d14c51adb/67f2e971b1c8a7c55b5b3b37_ToxMod%20Hero%20Image.webp',co:'Modulate, Inc. Founded ~2018, Boston. $32M raised (Series A led by Lakestar, with Hyperplane, Everblue, Galaxy). Keywords Studios partnership (Feb 2024). 160M+ hours of voice chat moderated.',desc:'Real-time AI voice chat moderation. Proprietary "Velma" Ensemble Listening Model analyses tone, intensity, escalation, interaction dynamics, emotion, and speech acts across 18 languages. Detects harassment, grooming, threats, doxxing, and escalation trajectories in real-time audio without transcription. Voice-only; pair with text moderation. UE5 plugin (v4.0.0), Discord Social SDK integration ("one line of code"). Server-side: voice routed to Modulate cloud (AWS EC2 G5g) for analysis.',ev:'Call of Duty: Modern Warfare II, Warzone, Modern Warfare III (Activision publicly credited ToxMod with detecting voice toxicity that report-based systems missed entirely). Riot Games (title undisclosed). Rec Room (VR social). Schell Games. ~80-90% estimated reduction in undetected voice toxicity incidents vs report-only moderation (industry estimate).',rat:'WATCH (timing, not quality). 7.7 composite, highest WATCH tool in the report. Purpose-built for game voice moderation with a proprietary model trained on gaming voice data. The need emerges at closed beta with voice features. Evaluate 6-9 months before first voice-enabled playtest. Cost: tiered by MAU (Epic/Legendary/Mythic tiers), request quote based on projected beta/launch MAU.',cpre:'$0',cpost:'TBD (MAU-based)',founded:'~2018',emp:'~50-80',fund:'$32M',url:'modulate.ai'},
{d:'marketing',name:'GGWP',vendor:'GGWP Inc.',v:'watch',comp:7.1,sc:[7,7,8,7,6,7],bgc:'#F59E0B',co:'GGWP, Inc. Founded 2020, San Francisco. CEO Dennis "Thresh" Fong (Quake champion, gaming industry pioneer, former CEO of Xfire and Raptr). Co-founder Kun Gao (Crunchyroll). $33.3M raised. Investors: Riot Games, Sony Innovation Fund, Samsung Ventures, YouTube co-founder Steve Chen, Bitkraft.',desc:'Comprehensive AI moderation covering text chat, voice chat (via Vivox partnership), player reports, and Discord in a single platform. Prosocial reinforcement (positive behaviour feedback loops), sentiment analysis, and player behaviour shaping. 98% automated triage of player reports across 18+ languages. Free tier available (July 2023). Official Unity/Vivox safety partner (March 2025).',ev:'Fatshark (Warhammer 40K: Darktide). thatgamecompany (Sky: Children of the Light — closest analogue to a cosy MMO in their portfolio). Another Axiom (Gorilla Tag). Omeda Studios, Dreamhaven, Sandbox confirmed. 25+ game company customers.',rat:'WATCH (timing). Broader coverage than ToxMod (text + voice + reports + Discord in one). Voice moderation via Vivox partnership, not proprietary model; ToxMod\'s Velma model is deeper on voice analysis. Evaluate competitively alongside ToxMod. If Vivox selected for voice middleware, GGWP has native integration advantage. Free tier enables low-risk initial evaluation.',cpre:'$0',cpost:'TBD (pay-as-you-go)',founded:'2020',emp:'~30-50',fund:'$33.3M',url:'ggwp.com'},
{d:'marketing',name:'Helpshift',vendor:'Keywords Studios',v:'watch',comp:7.8,sc:[8,9,8,7,7,6],bgc:'#2563EB',co:'Helpshift. Keywords Studios acquired for $75M. Gaming-native in-game SDK supporting Unity, UE5, iOS, Android, PC, console. 4 AI agents: Care AI, Engage AI, Guard AI, Community AI. 500+ game studios. Installed in approximately one-third of top-grossing gaming apps.',desc:'In-game player support platform purpose-built for gaming. SDK embeds directly into game clients enabling players to get help without leaving the game. 4 AI agents handle different support functions: Care AI (ticket resolution), Engage AI (proactive engagement), Guard AI (fraud detection), Community AI (community management). Automation handles common issues (login, payments, account recovery) while escalating complex cases to human agents. The dominant gaming-specific player support platform.',ev:'Supercell, Tencent, Zynga, EA, Sega, Ubisoft, Rovio, Krafton, Gameloft. 500+ game studios. The customer list is the most comprehensive in gaming player support. Keywords Studios acquisition for $75M validates the platform value.',rat:'WATCH (timing). Excellent tool with unmatched gaming credentials. For an MMO that will not have paying players until late 2028, player support infrastructure evaluation should begin 6-9 months before beta. Evaluate alongside Notch (Discord-native alternative). $150/mo starter with 250 issues and $0.45/issue overage; AI Copilot add-on at $50/agent/month.',cpre:'$0',cpost:'TBD (volume-based)',founded:'~2015',emp:'Keywords subsidiary',fund:'Acquired ($75M)',url:'helpshift.com'},
{d:'marketing',name:'Sett',vendor:'Sett',v:'watch',comp:6.6,sc:[8,7,7,5,5,5],bgc:'#F97316',img:'https://www.sett.ai/wp-content/uploads/2026/05/Hero_tech-scaled.png',co:'Sett. $57M raised ($12M seed, $15M Series A Bessemer, $30M Series B Greenfield). Tel Aviv. AI agents for UA creative pipeline: playable ads and video ads. 100+ studios on waitlist.',desc:'AI-powered user acquisition creative platform. AI agents generate playable and video ad creatives for mobile and cross-platform games. 15x faster and 25x cheaper than manual creative production (vendor-reported). Covers the full UA creative pipeline from concept to production-ready ad units. The strongest funded specialist in game-specific UA creative AI.',ev:'Zynga, Scopely, Playtika, SuperPlay, Rovio, Plarium. 100+ studios on waitlist. The customer list spans the largest mobile publishers. $57M total funding is the highest for any game-specific UA creative tool.',rat:'WATCH (timing). Relevant as launch approaches and user acquisition becomes critical. For a studio 2+ years from launch, UA creative tooling is a future concern. The funding level ($57M) and customer base (Zynga, Scopely) indicate a mature product. Evaluate 6-12 months before planned marketing campaigns begin.',cpre:'$0',cpost:'TBD',founded:'~2020',emp:'~50-100',fund:'$57M',url:'sett.ai'},
{d:'marketing',name:'Notch',vendor:'Notch',v:'watch',comp:6.0,sc:[7,4,7,5,7,6],bgc:'#6366F1',co:'Notch. $30M Series A (2026), $45M total raised. London. Gaming-specific AI support agents. Discord-native integration. Supports chat, email, and Discord in 75+ languages.',desc:'Gaming-specific AI player support with native Discord integration. AI agents handle login issues, account recovery, payment problems, and VIP player escalation. Discord-native design means support happens where gaming communities already live, reducing friction for players who use Discord as their primary communication platform.',ev:'$30M Series A in 2026 signals strong investor confidence. London-based. Discord-native approach is architecturally aligned with how MMO communities operate. Earlier-stage than Helpshift with limited public customer citations.',rat:'WATCH. Newer than Helpshift but the Discord-native approach is compelling for an MMO where Discord will be a primary community channel. Evaluate alongside Helpshift 6-9 months before beta. Both can coexist: Helpshift for in-game SDK support, Notch for Discord-based community support.',cpre:'$0',cpost:'TBD',founded:'~2022',emp:'Undisclosed',fund:'$45M',url:'notch.cx'},

{d:'data',name:'Sonamine',vendor:'Sonamine',v:'watch',comp:5.0,sc:[6,3,7,3,4,6],bgc:'#8B5CF6',co:'Sonamine. ~6 employees. No external funding disclosed. Focused exclusively on ML-based game analytics and churn prediction as core product.',desc:'ML-powered churn prediction and player lifecycle management for games. Behavioural segmentation, predictive targeting, and retention optimisation. One of the only specialist AI tools focused specifically on game player analytics rather than general business intelligence. The genuine ML focus is the differentiator vs analytics platforms.',ev:'HyperBeard (mobile indie). No other confirmed game studio citation. No evidence at AA/AAA or MMO scale. The vendor risk (~6 employees, no funding) is the primary concern, not the technology approach.',rat:'WATCH. Genuine ML product focused on the right problem, but vendor scale is insufficient for an MMO dependency. Analytics platforms (GameAnalytics: free, 100K+ games, UE5 SDK; Azure PlayFab: Microsoft-backed, built-in ML churn prediction, Economy V2 for MMO economies) provide adequate ML features at far more reliable scale. Revisit when live player data exists post-beta.',cpre:'$0',cpost:'$0',founded:'~2015',emp:'~6',fund:'None disclosed',url:'sonamine.com'},

{d:'data',name:'Pecan AI',vendor:'Pecan AI',v:'watch',comp:6.3,sc:[7,7,7,5,6,4],bgc:'#F97316',co:'Pecan AI. Predictive analytics platform using AutoML to build churn prediction, LTV, and demand forecasting models without requiring data scientists. Connects directly to data warehouses (Snowflake, BigQuery, Redshift).',desc:'Predictive AI platform that turns business questions into production-grade ML models in days, not months. Churn prediction, player lifetime value, demand forecasting, and conversion modelling. 2026 update introduced a predictive modelling AI agent using conversational AI to help analysts build models without code. Connects to existing data infrastructure. Vendor-reported results: average customer reports 12% lower churn, 15% better marketing ROAS, 25% lower inventory costs.',ev:'Enterprise customers across multiple industries. Gaming-specific applications: predicted ROAS, likelihood to convert, churn risk scoring, high-value segment identification. Not game-specialist but the AutoML approach is directly applicable to game LiveOps analytics. Pricing: Starter to Enterprise tiers (contact for quote).',rat:'WATCH. More practical than Sonamine for a studio building analytics infrastructure: Pecan connects to standard data warehouses and produces models without data scientists, whereas Sonamine is a micro-vendor with a single gaming citation. However, Pecan requires data infrastructure that does not exist pre-launch (no player data, no telemetry, no data warehouse). Evaluate post-beta when live player data and analytics infrastructure are in place.',cpre:'$0',cpost:'$0',founded:'Undisclosed',emp:'Undisclosed',fund:'Undisclosed',url:'pecan.ai'},

{d:'hr',name:'HireVue',vendor:'HireVue',v:'watch',comp:5.5,sc:[7,8,3,4,5,4],bgc:'#059669',co:'HireVue. Founded 2004, South Jordan, Utah. Acquired by The Carlyle Group (2019). ~700+ employees. 800+ enterprise clients including Fortune 500. Industry leader in AI video interviewing and assessment.',desc:'AI-powered video interviewing and candidate assessment. Game-based psychometric evaluations, structured interview scoring, competency analysis. Processes millions of interviews annually. Mature enterprise product with extensive production evidence outside gaming. The tool works; the barrier is regulatory, not technical.',ev:'Fortune 500 adoption across multiple industries. Strongest production evidence of any HR AI tool by volume. Not game-industry specific; no game studio case study found. The tool has been used for hiring at massive scale across enterprise.',rat:'WATCH. Mature product blocked by regulatory barriers at studio scale. GDPR Article 22 restricts automated employment decisions (compliance requires meaningful human involvement that negates much of the automation benefit). EU AI Act classifies AI hiring as high-risk (conformity assessments, documentation, ongoing monitoring). At ~15-25 hires/year, compliance overhead exceeds ROI. Revisit when hiring >100/year or HR team grows to 2+.',cpre:'$0',cpost:'$0',founded:'2004',emp:'~700+',fund:'Private (Carlyle)',url:'hirevue.com'},

{d:'finance',name:'Harvey',vendor:'Harvey Inc.',v:'watch',comp:6.9,sc:[7,9,9,5,7,1],bgc:'#1E40AF',img:'https://cdn.sanity.io/images/07s0r5r6/production/8f29fcfce7a2b69616005ef38dd6edaa20613c6e-5760x3240.png?auto=format',co:'Harvey Inc. Founded 2022, San Francisco. $1.22B raised. $11B valuation (March 2026). Sequoia, Kleiner Perkins, a16z. 70%+ of Am Law 10. 1,500+ customers across 60+ countries. 500+ in-house legal teams. Offices: San Francisco, Dublin (March 2026), Paris (May 2026), Singapore (June 2026).',desc:'AI legal assistant on custom LLM infrastructure. Legal research, contract analysis, drafting, due diligence, regulatory compliance, litigation support. First AI startup certified under EU-US Data Privacy Framework. Zero data retention from model providers. Customer data not used for training. EU, Switzerland, US, Australia data residency. SAML SSO, audit logs, IP allow-listing. Best-in-class privacy posture among ALL AI tools evaluated in this report.',ev:'Allen & Overy (first major law firm partner; public case study on AI-augmented deal review). PwC Legal. Freshfields Bruckhaus Deringer. 50% of Am Law 100. Gold standard for AI legal technology. No game studio usage (tool is designed for law firms).',rat:'WATCH. Excellent product, structural pricing mismatch. Minimum 25-50 seats ($30K+/year) when one person needs it. Cost Efficiency of 1 reflects this. Harvey\'s broader capability (legal research, drafting, compliance, not just contracts) is more aligned with a General Counsel\'s varied workflow than Luminance. IP/Legal Safety at 9 is the best of any tool in this report. Revisit if small-team tier emerges or legal team grows.',cpre:'$0',cpost:'$0',founded:'2022',emp:'~400+',fund:'$1.22B',url:'harvey.ai'},
{d:'finance',name:'Luminance',vendor:'Luminance Technologies',v:'watch',comp:6.1,sc:[6,9,6,5,7,1],bgc:'#6366F1',co:'Luminance Technologies Ltd. Founded 2015 by mathematicians from University of Cambridge. London/Cambridge + New York, Singapore. ~$168M raised ($75M in Feb 2025). 1,000+ organisations across 70 countries.',desc:'Legal-grade AI contract management with six modules: Draft, Negotiate, Analyse, Comply, Investigate, Collaborate. Proprietary "Panel of Judges" architecture cross-checks outputs across multiple models to reduce hallucination and improve accuracy. On-premise deployment option available for the most sensitive documents (cap table, fundraising terms). ISO 27001:2022, SOC 2 Type 2. AES-256 encryption at rest.',ev:'All Big Four accounting firms. Quarter of Global Top 100 law firms (Clifford Chance, KPMG). Named corporates: AMD, Hitachi, LG, BBC Studios, Koch Industries, Figma, Tesco, Hyundai. Jagex logo appeared on website (no case study; if confirmed, only game studio citation). Mid-market first-year estimates: $150K-$300K including platform, per-user, modules, and implementation.',rat:'WATCH. Strong contract analysis designed for high-volume legal departments ($150K-$300K/year). Cost Efficiency of 1 reflects cost exceeding a junior lawyer\'s salary. Capability at 6 (vs Harvey\'s 7) reflects narrower focus on contract analysis vs Harvey\'s broader legal assistant. On-premise option is an advantage for the most sensitive documents. Revisit if small-team tier emerges.',cpre:'$0',cpost:'$0',founded:'2015',emp:'~200+',fund:'~$168M',url:'luminance.com'},

function vTag(v){return`<span class="vt vt-${v[0]}">${v.toUpperCase()}</span>`}

function renderScores(sc){return`<div class="scores">${sc.map((s,i)=>`<div class="scol"><div class="sdim">${DIMS[i]}</div><div class="sbar-bg"><div class="sbar" style="width:${s*10}%;background:${sColor(s)}"></div></div><div class="sval">${s}</div></div>`).join('')}</div>`}

const hero=t.img?`<div class="tool-hero" style="background:linear-gradient(135deg,${t.bgc||'#1E2438'}20,transparent)"><img src="${t.img}" alt="${t.name} product" onerror="this.style.display='none';this.parentElement.style.height='6px';this.parentElement.style.borderRadius='14px 14px 0 0'"></div>`:`<div class="tool-accent" style="background:linear-gradient(135deg,${t.bgc||'#1E2438'}20,transparent)"></div>`;
return`<div class="tool-card tc-${t.v}">${hero}
<div class="tool-top"><div><div class="tool-name-row">${icon}<h3>${t.name}</h3>${vTag(t.v)}</div><div class="tool-co">${t.co}</div><div class="tool-desc">${t.desc}</div></div>
<div class="comp-box"><div class="comp-n" style="color:${sColor(t.comp)}">${t.comp}</div><div class="comp-l">Composite</div></div></div>

<div class="cost-strip"><div class="cs-pair"><span class="cs-l">Pre-launch</span><span class="cs-v">${t.cpre}</span></div><div class="cs-pair"><span class="cs-l">Post-launch annual</span><span class="cs-v">${t.cpost}</span></div></div></div>`}
function renderDisc(d){const tools=TOOLS.filter(t=>t.d===d.id).sort((a,b)=>{const o={adopt:0,pilot:1,watch:2,avoid:3};return o[a.v]-o[b.v]});const tc=tools.length;const tl=tc===1?'1 tool profiled':`${tc} tools profiled`;return`

const secs=[{id:'overview',name:'Overview'},...DISC];
const tabsEl=document.getElementById('tabs'),contentEl=document.getElementById('content'),tabsWrap=document.getElementById('tabsWrap');
secs.forEach((s,i)=>{const t=document.createElement('div');t.className='tab'+(i===0?' active':'');t.textContent=s.name;t.onclick=()=>sw(s.id);t.dataset.id=s.id;tabsEl.appendChild(t)});
function sw(id){document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.id===id));document.querySelectorAll('.pane').forEach(p=>p.classList.toggle('active',p.dataset.id===id));const at=document.querySelector('.tab.active');if(at)at.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});window.scrollTo(0,0)}
secs.forEach(s=>{const p=document.createElement('div');p.className='pane'+(s.id==='overview'?' active':'');p.dataset.id=s.id;p.innerHTML=s.id==='overview'?renderOverview():renderDisc(s);contentEl.appendChild(p)});
function updateScroll(){const sl=tabsEl.scrollLeft,max=tabsEl.scrollWidth-tabsEl.clientWidth;tabsWrap.classList.toggle('scrolled',sl>4);tabsWrap.classList.toggle('at-end',sl>=max-4)}
tabsEl.addEventListener('scroll',updateScroll);window.addEventListener('resize',updateScroll);updateScroll();
