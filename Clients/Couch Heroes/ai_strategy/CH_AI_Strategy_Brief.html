{id:'art',name:'Art Pipeline',sec:6,cost:'$14,400',
over:'The largest discipline in any game studio, and the most contested space for AI. Community sensitivity to AI-generated imagery is at an all-time high, platform disclosure requirements are tightening, and training data provenance remains legally unsettled. Eight tools were evaluated across concept art, texturing, 3D generation, procedural content, and environment layout. Two clear the bar for piloting: Adobe Firefly Enterprise (strongest IP indemnification, exclusively licensed training data) and Substance 3D AI (zero-friction augmentation of the industry-standard texturing tool). Midjourney has the highest raw capability for image generation but IP/Legal concerns block it. Houdini ML features are already available in the existing DCC stack. Scenario.gg enables custom model training on a studio\'s own art for style-consistent output. In 3D generation, Tripo3D ($50M funding from Alibaba/Baidu, 6.5M users, quad topology with PBR) and Meshy ($15M ARR, rapid growth) represent the two leading platforms, with Tripo3D more technically mature. Promethean AI offers AI-assisted environment layout but carries critical company risk (3 employees, $300K funding). Tractive (a16z Speedrun backed, Rocksteady/Supercell/Jagex collaborators) is the first dedicated AI retopology tool, addressing one of the most time-consuming steps in the 3D asset pipeline, but remains pre-release. Also evaluated but not individually profiled: Stable Diffusion XL (WATCH 5.7, requires self-hosted GPU infrastructure), InstaMAT (WATCH 6.3, similar to Substance), Leonardo AI (indie-focused, not game-specialist), Layer AI (mobile-focused 2D).',
risks:[{r:'AI concept imagery leaks into pipeline without human redraw',l:2,i:5,s:10,m:'Attribution metadata standard; named artist sign-off required'},{r:'Community detects AI art in marketing materials',l:3,i:5,s:15,m:'AI imagery AVOID for all public-facing content'},{r:'Midjourney IP litigation unresolved (Getty Images class)',l:3,i:4,s:12,m:'WATCH until IP litigation resolves and indemnification offered'},{r:'Promethean AI ceases operations (3 employees, $300K funding)',l:3,i:2,s:6,m:'WATCH only; no production dependency'}],
gov:[{item:'AI-assisted concept art guidelines',area:'Production Integration',pri:'HIGH'},{item:'Asset attribution metadata standard',area:'IP Safeguards',pri:'MEDIUM'},{item:'Platform AI disclosure documentation',area:'IP Safeguards',pri:'MEDIUM'}]},
{id:'audio',name:'Audio',sec:7,cost:'$2,376',
over:'AI audio tools span three categories: SFX (search and generation), music composition, and voice acting. SFX tools are low-risk; voice performance tools face SAG-AFTRA and UK Equity constraints but Replica Studios holds the first SAG-AFTRA agreement for AI voice replicas in games, and Resemble AI\'s Chatterbox is used by Creative Assembly (Total War) and Krafton (PUBG, inZOI). Eight tools evaluated across SFX, voice, music, and mastering. Wwise Sound Search and ElevenLabs SFX are the two PILOT recommendations. For music: AIVA can generate sketches in 250+ styles but cannot match a human composer for a distinctive game soundtrack; Soundraw is explicitly AVOID (no IP indemnification, no production evidence, game jam developers rejected it). For mastering: iZotope Ozone scores 7.6 but its parent company (Native Instruments) entered insolvency in January 2026; inMusic announced acquisition in May 2026 (pending completion). LANDR is a music creator tool, not game-specific.',
risks:[{r:'SAG-AFTRA/Equity rules expand to cover AI-generated SFX',l:2,i:4,s:8,m:'Monitor union negotiations; pivot if scope expands'},{r:'iZotope parent company (NI) insolvency; mastering tools lose support',l:3,i:2,s:6,m:'Monitor inMusic acquisition. Fallback: perpetual licences remain functional offline'},{r:'AI-generated audio detected by community',l:2,i:4,s:8,m:'AI SFX as starting points only; all shipped audio processed by human designers'}],
gov:[{item:'SAG-AFTRA/Equity compliance documentation',area:'IP Safeguards',pri:'HIGH'},{item:'Audio middleware selection (gates Wwise recommendation)',area:'Tool Selection & Licensing',pri:'HIGH'}]},
{id:'cinematics',name:'Cinematics & Video',sec:19,cost:'$0 (WATCH)',
over:'AI video generation reached cinematic quality in 2026, creating a genuine use case for game studios: cutscene previsualization, trailer prototyping, and internal pitch content. Seedance 2.0 (ByteDance, April 2026) leads with studio-friendly IP scanning that automatically detects and flags protected intellectual property in generated frames, making it the first "studio-friendly" AI video generator. Runway Gen-4.5 offers the strongest character consistency and reference image support. Kling 3.0 (Kuaishou) excels at multi-shot narrative coherence with native 4K output and storyboard tools. All three are WATCH: no game studio has shipped cinematics created with these tools, the output quality gap between AI video and UE5 real-time cinematics remains significant for production, and data sovereignty concerns apply to ByteDance and Kuaishou (both China-headquartered). However, for rapid previsualization of cutscene concepts before committing to full UE5 Sequencer production, these tools offer genuine value at the ideation stage.',
risks:[{r:'AI-generated video quality insufficient for shipped cinematics',l:4,i:2,s:8,m:'Use for previz/prototyping only; UE5 Sequencer for production'},{r:'Data sovereignty: ByteDance (Seedance) and Kuaishou (Kling) are China-HQ',l:3,i:4,s:12,m:'Do not input partner IP, unreleased game content, or narrative spoilers'},{r:'Community detects AI-generated content in trailers',l:3,i:5,s:15,m:'AI video for internal previz only; all shipped trailers from UE5 real-time capture'}],
gov:[{item:'AI video generation usage policy (previz only)',area:'Usage Policy & Governance',pri:'HIGH'},{item:'Data classification for video gen inputs',area:'IP Safeguards',pri:'HIGH'}]},
{id:'engineering',name:'Engineering',sec:8,cost:'$2,880',
over:'AI coding tools for game development are narrower than the general-purpose code assistant market suggests. This section evaluates UE5-specific AI tools only: Blueprint generation, C++ assistance, and editor-integrated agents. General-purpose code assistants (Copilot, Cursor, Windsurf) are excluded per methodology. Aura is the only UE5-native AI coding agent with proprietary Blueprint reasoning. UE CoPilot offers breadth (1,050+ tool actions) but has critical credibility concerns (solo developer, 20x reported token consumption, user banned for reporting issues).',
risks:[{r:'Aura vendor risk: Ramen VR pivoted from failed VR MMO to developer tools',l:3,i:3,s:9,m:'PILOT-only; $35M funding provides runway but company is <2 years into pivot'},{r:'Generated Blueprints introduce bugs in multiplayer systems',l:2,i:4,s:8,m:'All AI-generated code reviewed before commit; restrict to non-critical systems during PILOT'},{r:'UE CoPilot: solo developer, credibility concerns, 20x token consumption reported',l:3,i:2,s:6,m:'WATCH only; no production dependency'}],
gov:[{item:'Code review policy for AI-generated code',area:'Production Integration',pri:'HIGH'},{item:'Source code data classification (partner IP exclusion)',area:'IP Safeguards',pri:'HIGH'}]},
{id:'devops',name:'DevOps',sec:9,cost:'$0 (WATCH)',
over:'CI/CD AI tools exist but the category is immature for game-specific build pipelines. UE5 builds involve client, server, editor, and shader compilation stages that generic CI/CD AI tools are not trained on. TeamCity AI (JetBrains) is the most relevant option, offering AI build failure analysis and an MCP endpoint for external agent integration, but remains in Early Access. The discipline requires foundational CI/CD platform decisions before AI tooling adds value.',
risks:[{r:'TeamCity AI Build Analyzer still in Early Access',l:4,i:2,s:8,m:'WATCH verdict; re-evaluate when GA'},{r:'CI/CD platform choice constrains AI tool options',l:3,i:2,s:6,m:'Evaluate AI capabilities as secondary criterion in platform selection'}],
gov:[{item:'CI/CD platform selection',area:'Tool Selection & Licensing',pri:'HIGH'},{item:'Build log data classification (source paths, config)',area:'IP Safeguards',pri:'MEDIUM'}]},
{id:'gamedesign',name:'Game Design',sec:10,cost:'$2,400–$5,280',
over:'Economy balancing is the most acute design challenge for any MMO with subscription monetisation, a cosmetics marketplace, and in-game currency. Machinations addresses this directly: visual economy simulation modelling currency flows, sink/faucet ratios, and progression curves before a line of code is written. Proven at Ubisoft, Gameloft (34% production time reduction), and Wargaming. Ludo.ai supplements manual game research with AI-powered market analysis, competitive intelligence, and trend tracking, proven at Rovio, Voodoo, and SayGames.',
risks:[{r:'Economy model in Machinations diverges from live implementation',l:3,i:4,s:12,m:'Simulation is an input to design, not the source of truth'},{r:'Machinations: borderline AI criterion (simulation, not ML)',l:2,i:1,s:2,m:'Best available tool for this task regardless of classification'}],
gov:[{item:'Approved tool list (design)',area:'Tool Selection & Licensing',pri:'MEDIUM'}]},
{id:'qa',name:'QA & Testing',sec:11,cost:'~$60,000 (est.)',
over:'Automated AI playtesting delivers the highest production impact of any AI category in game development. Three tools evaluated: modl.ai (autonomous bots, 10,000+ simulated play-hours per cycle), GameDriver (Quality-as-a-Service with UE5 Blueprint integration and AI test assistant), and ManaMind (autonomous testing agents, pre-seed stage). modl.ai is the primary PILOT recommendation. GameDriver offers a complementary approach with lighter integration for functional testing and AI-assisted test script writing via MCP. ManaMind is too early (pre-seed April 2026) but worth monitoring.',
risks:[{r:'modl.ai pricing differs from $60K estimate (CEO quote from 2022)',l:3,i:4,s:12,m:'Verify pricing directly with modl.ai before budget approval'},{r:'modl.ai vendor viability: 18 employees, no funding since 2022',l:2,i:3,s:6,m:'PILOT-only; no production dependency'},{r:'AI bots miss emergent player behaviour that human QA catches',l:3,i:3,s:9,m:'AI playtesting supplements, never replaces, human testing'}],
gov:[{item:'modl.ai pricing verification',area:'Budget Approval',pri:'HIGH'},{item:'AI playtesting data retention policy',area:'IP Safeguards',pri:'MEDIUM'}]},
{id:'narrative',name:'Narrative & Localisation',sec:12,cost:'$0 (WATCH)',
over:'Six tools evaluated across NPC dialogue AI, on-device AI agents, and translation management. The NPC dialogue category is not ready for production: Charisma.ai, Inworld AI, and Convai all receive WATCH verdicts with no shipped commercial game using any of them. The category leader (Inworld) has broadened beyond game-specific NPC tooling. NVIDIA ACE Game Agent SDK is the most architecturally promising approach: open-source, on-device (no cloud latency), with UE5 plugins and confirmed adoption in PUBG and Total War. But it is an SDK requiring significant engineering, not a plug-and-play tool. For localisation: memoQ and Phrase TMS are both excellent, mature platforms (WATCH due to timing, not quality). SAG-AFTRA/Equity compliance, Steam Live-Generated disclosure, and community perception compound across all NPC dialogue tools.',
risks:[{r:'NPC dialogue AI category remains immature through 2028',l:4,i:3,s:12,m:'WATCH verdicts include 6-monthly revisit dates'},{r:'SAG-AFTRA/Equity grievance over AI voice in NPC dialogue',l:3,i:5,s:15,m:'No AI voice tools adopted; all voice by human performers'},{r:'Community backlash if AI-generated NPC dialogue detected',l:4,i:5,s:20,m:'All NPC dialogue tools WATCH; no AI dialogue ships without full compliance'}],
gov:[{item:'SAG-AFTRA/Equity compliance framework for AI voice',area:'IP Safeguards',pri:'CRITICAL'},{item:'Steam Live-Generated disclosure assessment',area:'IP Safeguards',pri:'HIGH'},{item:'AI content community communication strategy',area:'Usage Policy & Governance',pri:'HIGH'}]},
{id:'production',name:'Production & PM',sec:13,cost:'$0',
over:'No specialist AI production management tool exists, but general-purpose AI platforms fill the gap across Production and all business functions. Claude for Teams ($20-25/seat/month) provides dedicated Finance and HR plugins (February 2026), meeting summarisation, sprint planning assistance, and document workflows. This is the practical alternative for every business discipline where specialist tools are either $150K+ (Harvey for legal), blocked by regulation (HireVue for hiring), or non-existent. CRITICAL: deployment requires a data classification framework with three enforced tiers separating safe, restricted, and prohibited data categories to protect game IP, financial data, and employee PII. Jira AI and Rovo features (included in existing Atlassian subscriptions) complement this for project management specifically.',
risks:[{r:'Over-reliance on AI for sprint planning displaces human judgement',l:2,i:3,s:6,m:'AI suggestions are inputs to decisions, not decisions'}],
gov:[{item:'Data classification for meeting summaries',area:'IP Safeguards',pri:'MEDIUM'}]},
{id:'marketing',name:'Marketing & Community',sec:14,cost:'$0 (WATCH)',
over:'Three AI categories serve the community-facing side of MMO operations. Community moderation: ToxMod ($32M raised, proprietary voice model "Velma", 160M+ hours moderated) and GGWP ($33M, Riot/Sony-backed, multi-modal) are the two proven platforms for live-service voice and text chat. Player support: Helpshift is the dominant gaming-specific platform (Keywords Studios acquisition for $75M, 500+ studios, in-game SDK) with Notch ($45M raised, London, Discord-native) as a complementary alternative. UA creative: Sett ($57M raised, Zynga/Scopely/Playtika customers) generates playable and video ad creatives with AI agents, the strongest funded specialist in game-specific UA creative AI. All three sub-categories become requirements at different milestones: moderation at closed beta, player support at beta, UA at launch preparation. AI-generated marketing imagery for public-facing materials remains extremely high-risk: studios review-bombed 2024-2026 after community detection.',
risks:[{r:'AI-generated marketing content detected by community',l:4,i:5,s:20,m:'AVOID verdict; no AI imagery in public-facing materials'},{r:'Community moderation vendor pivots or ceases operations',l:2,i:3,s:6,m:'Both ToxMod and GGWP well-funded ($32-33M); evaluate both competitively'},{r:'Voice moderation not deployed at beta; unchecked toxicity damages community',l:3,i:4,s:12,m:'Begin vendor evaluation 6-9 months before first voice-enabled playtest'}],
gov:[{item:'AI marketing content prohibition policy',area:'Usage Policy & Governance',pri:'HIGH'},{item:'Community moderation policy and appeals process',area:'Usage Policy & Governance',pri:'HIGH'},{item:'Voice data processing DPA',area:'IP Safeguards',pri:'MEDIUM'}]},
{id:'data',name:'Data & Analytics',sec:15,cost:'$0 (WATCH)',
over:'The discipline where AI could add the most value (churn prediction, economy monitoring, LiveOps optimisation) but where specialist tools are thinnest. Sonamine is the only genuinely ML-focused game analytics product identified, offering churn prediction and player lifecycle management as its core product. However, it operates at micro-scale (~6 employees, no external funding) with a single mobile indie citation (HyperBeard). Analytics platforms (GameAnalytics at 100K+ games, Azure PlayFab with built-in ML churn prediction) are viable infrastructure but are platforms, not specialist AI tools. A 10-item pre-beta analytics readiness checklist covering telemetry, economy monitoring, and exploit detection is provided in the full report.',
risks:[{r:'Sonamine vendor viability: ~6 employees, no external funding',l:4,i:2,s:8,m:'WATCH only; no dependency. Use analytics platforms for launch'},{r:'MMO launches without economy monitoring or exploit detection',l:4,i:5,s:20,m:'Economy health dashboard and exploit alerting required before beta'},{r:'Specialist AI analytics remain unavailable at MMO scale',l:3,i:3,s:9,m:'Analytics platforms provide adequate ML features for launch needs'}],
gov:[{item:'Player data classification (PII, telemetry, GDPR)',area:'IP Safeguards',pri:'HIGH'},{item:'Telemetry event taxonomy specification',area:'Production Integration',pri:'HIGH'}]},
{id:'hr',name:'HR & People',sec:16,cost:'$0 (WATCH)',
over:'AI hiring tools are a mature enterprise category. HireVue (800+ clients, millions of interviews processed annually) is the market leader for AI video assessment and game-based psychometric evaluation. However, two regulatory barriers block adoption at studio scale: GDPR Article 22 restricts solely automated decision-making in employment (compliance requires meaningful human involvement that negates much of the automation benefit), and the EU AI Act classifies AI hiring systems as high-risk requiring conformity assessments, technical documentation, and ongoing monitoring. At ~15-25 hires per year, the compliance overhead exceeds the ROI. No specialist AI tool is recommended for current adoption.',
risks:[{r:'GDPR Article 22 + EU AI Act barriers persist at studio scale',l:4,i:2,s:8,m:'Revisit when hiring volume exceeds 100+/year or HR team grows to 2+'},{r:'AI hiring tools adopted without regulatory compliance',l:2,i:5,s:10,m:'No AI hiring tools recommended; regulatory review required before any adoption'}],
gov:[{item:'GDPR Article 22 compliance assessment',area:'Regulatory',pri:'MEDIUM'},{item:'EU AI Act recruitment classification review',area:'Regulatory',pri:'LOW'}]},
{id:'finance',name:'Finance & Legal',sec:17,cost:'$0 (WATCH)',
over:'Two genuine AI tools exist for legal work, both excellent products designed for law firms. Harvey ($1.2B raised, $11B valuation, 70%+ of Am Law 10, first AI startup certified under EU-US Data Privacy Framework, zero data retention from model providers) is the gold standard for AI legal technology. Luminance ($168M raised, Cambridge-founded, all Big Four firms, proprietary "Panel of Judges" architecture that cross-checks across multiple models to reduce hallucination, on-premise deployment option) offers deep contract analysis. Both score well on capability and production evidence but score 1 on Cost Efficiency: pricing ($150K-$300K/year) targets firms reviewing hundreds of contracts. The strategic recommendation: encourage external law firms to adopt AI-assisted review; the studio benefits indirectly through faster contract turnaround at standard hourly rates.',
risks:[{r:'AI legal tools remain priced beyond single-counsel reach',l:4,i:2,s:8,m:'Monitor for small-team tiers; encourage external firms to adopt'},{r:'Sensitive data (cap table, fundraising) processed through cloud AI',l:2,i:5,s:10,m:'No direct AI legal tool adoption; external firms governed by their own DPAs'}],
gov:[{item:'Data classification for financial/legal documents',area:'IP Safeguards',pri:'HIGH'},{item:'External law firm AI usage policy',area:'IP Safeguards',pri:'MEDIUM'}]},
{id:'platform',name:'Platform & Backend',sec:18,cost:'$0 (WATCH)',
over:'Anti-cheat, fraud detection, matchmaking, and infrastructure scaling for MMOs are primarily custom engineering. The AI anti-cheat market is dominated by FPS-centric behavioural analysis: Anybrain ($1.1M seed, patent-protected biometrics, analyses 70+ input patterns) detects abnormal behaviour but its FPS focus is a partial fit for an MMO where economy exploits, bot farming, and social abuse are the primary threats rather than aimbotting. Economy fraud detection has no commercial AI solution and remains bespoke engineering. Standard anti-cheat middleware (Easy Anti-Cheat, free for UE5) handles client-side integrity; AI behavioural analysis is a supplementary layer.',
risks:[{r:'Anybrain: FPS-centric tool, partial fit for MMO anti-cheat needs',l:3,i:3,s:9,m:'Server-side economy detection required regardless; Anybrain is supplementary'},{r:'No commercial AI tool exists for MMO economy fraud detection',l:4,i:4,s:16,m:'Custom engineering; data infrastructure and economy monitoring are prerequisites'}],
gov:[{item:'Anti-cheat policy and threat model',area:'Usage Policy & Governance',pri:'HIGH'},{item:'Player behavioural data classification and retention',area:'IP Safeguards',pri:'HIGH'}]}
];

const TOOLS=[
// ── ANIMATION (3) ──
{d:'animation',name:'MetaHuman Animator',vendor:'Epic Games',v:'adopt',comp:8.8,sc:[9,9,9,7,9,10],bgc:'#0078F2',co:'Epic Games. Private (Tencent ~40%). Unreal Engine, Fortnite, billions in revenue. One of the most stable companies in gaming. MetaHuman Animator launched 2023; audio-only mode added in UE 5.6.',desc:'Converts iPhone facial performance into production-quality animation on MetaHuman characters. UE 5.6 added audio-only mode: generates facial animation from speech alone, no camera needed. Free, native UE5, zero licensing cost. The technology runs entirely within the engine with no external dependencies or data egress.',ev:'Hellblade II: Senua\'s Saga (Ninja Theory, AAA, 2024). Clair Obscur: Expedition 33 (Sandfall, ~30 people, 2025). Eriksholm: The Stolen Dream (River End, 17 people, 2025). Mafia: The Old Country (Hangar 13, in production). Tom Guillermin (CTO, Sandfall): "We switched our whole character creation pipeline to MetaHuman." Proven across AAA to indie at every scale.',rat:'The only tool warranting immediate full rollout. Zero cost, proven across AAA to indie, no IP or union risk, native UE5. ~50-70% reduction in facial animation capture/cleanup time. ~6-10x speedup per sequence (Epic benchmark: 80 minutes vs 1+ day). Requires only an iPhone with TrueDepth camera per capture station.',cpre:'$0',cpost:'$0',founded:'2023 (MHA); Epic 1991',emp:'~30,000',fund:'Private',url:'unrealengine.com/metahuman'},
{d:'animation',name:'Rokoko Smartsuit Pro II',vendor:'Rokoko',v:'pilot',comp:6.6,sc:[7,6,8,5,6,7],bgc:'#FF4655',img:'https://cdn.prod.website-files.com/5e6b63ac3b6e253f11889f39/69e8b680c01a006c1e43af2b_RKK_Smartgloves-II-Banner%20copy%203.jpg',co:'Founded 2014, Copenhagen. ~120 employees. ~$11-15M raised. $80M+ valuation. Active RICO lawsuit (Walsh v. Rokoko, C.D. Cal.): settlement discussions ordered Feb 2026. Despite legal risk, the company continues to operate and ship product updates.',desc:'Full-body IMU motion capture suit (~$2,495/unit) with AI-assisted cleanup: auto-clean removes noise, auto-smooth interpolates jitter, retargeting maps to custom rigs. Vision AI adds webcam capture for remote sessions. Suit on/off in ~6 minutes vs ~45 minutes for optical systems. The AI cleanup layer is what elevates this beyond traditional hardware mocap into an AI-augmented capture pipeline.',ev:'Praey for the Gods (No Matter Studios, 3-person team, 2021). Widely used in indie, education, and broadcast. BoroCG: "Sensors provide clean results sufficient for developing games." No Film School: "High Quality Mocap for a Fraction of the Cost." Adopted by hundreds of indie studios for remote-friendly motion capture.',rat:'Best fit for 100% remote studios. ~40-60% time reduction vs manual keyframing for locomotion and combat base poses. PILOT: 2 suits, 2-3 animators, 3-month trial, 20-30 combat clips. Financial exposure limited to ~$7,400. If RICO lawsuit settles unfavourably, sunk cost is contained.',cpre:'~$7,400',cpost:'~$1,200/yr',founded:'2014',emp:'~120',fund:'~$11-15M',url:'rokoko.com'},
{d:'animation',name:'Cascadeur',vendor:'Nekki',v:'pilot',comp:7.4,sc:[8,5,9,7,6,9],bgc:'#6C5CE7',img:'https://cascadeur.com/images/original/sections/2/2.png',co:'Nekki (Shadow Fight series, 200M+ downloads). Founded 2007, Cyprus. Version 2025.1. UE5 Live Link plugin shipped April 2026 (2026.1), funded by $50K Epic MegaGrant. Self-funded, stable parent company.',desc:'AI-assisted keyframe animation: AutoPhysics (physically-accurate force simulation adjusting centre of mass and momentum), AI Inbetweening (combat/acrobatic/locomotion presets), auto-posing from partial input. All AI models run locally, fully offline. The only commercially available AI keyframe tool with physics simulation. Desktop application with no cloud dependency; all processing happens on local hardware.',ev:'Shadow Fight 3 (vendor\'s own title). CG Channel (April 2025): praised AI Inbetweening for reducing "the most tedious part of animation." AutoPhysics produces "convincingly weighted" combat poses. No independent studio confirmed shipping. UE5 Live Link released (Cascadeur 2026.1), enabling direct scene streaming to Unreal.',rat:'~30-50% combat animation time reduction. The only tool combining AI with physics simulation for keyframe animation. The byte-punk aesthetic may require intentionally exaggerated physics; PILOT should test AutoPhysics override. PILOT: 2 Pro seats, 3 months, 10-15 combat clips. Perpetual licence after 12 months subscription. FBX round-trip also available if Live Link unsuitable.',cpre:'~$1,584',cpost:'~$792/yr (or $0 perpetual)',founded:'2007 (Nekki)',emp:'200+ (group)',fund:'Self-funded',url:'cascadeur.com'},

{d:'animation',name:'Move.ai',vendor:'Move.ai',v:'watch',comp:6.9,sc:[8,6,8,6,7,5],bgc:'#00D4AA',co:'Move.ai. Founded 2019, London (UK Companies House no. 11886662). $17.4M raised across 7 rounds. Co-founder Tino Millar resigned as director Feb 2026 (Companies House filing). EA 4-year co-development for Genesis motion capture system confirmed. AI markerless motion capture from standard video. Multi-camera support (2-6 cameras). No suit, no markers, no studio required.',desc:'Markerless AI motion capture extracting high-fidelity motion data from video footage. Move One: single camera app ($48/seat/month for commercial Standard tier, $225/seat for Gen 2 Plus with hand tracking, $490/seat for 4K Advanced). Move Pro/Genesis: multi-camera professional system ($995 paid trial for 30 days, Enterprise pricing thereafter). Credit-based: Gen 1 uses 1 credit/person/second, Gen 2 uses 2 credits/person/second. Exports FBX and BVH compatible with UE5, Unity, Blender, Maya. API available ($0.012-$0.043/second depending on model and camera count). Multi-person tracking on Enterprise tier only.',ev:'Widely adopted across game, film, and broadcast. Move Pro/Genesis requires single NVIDIA GPU (RTX 30/40/50 or A-series) and 6-12 Z-Cams for professional quality. The technology combines computer vision, biomechanics modelling, and deep learning with temporal smoothing and biomechanical constraints. EA co-development for Genesis confirmed. Just Dance 2023 (Ubisoft) is the only verified shipped game. App Store rating 3.0/5 with 28 ratings. No facial capture support. Multi-person capture is Enterprise-only.',rat:'WATCH. Strong alternative to Rokoko for studios wanting mocap without hardware investment. Move One Standard at $48/seat/month provides commercial-use markerless capture from any camera. For occasional mocap, this is more cost-effective than purchasing Rokoko suits ($5,000+). For daily production, Rokoko hardware may be more consistent. Evaluate alongside Rokoko PILOT. Credits do not roll over month to month.',cpre:'$0',cpost:'$0',founded:'2019',emp:'Undisclosed',fund:'$17.4M',url:'move.ai'},
{d:'animation',name:'NVIDIA Kimodo',vendor:'NVIDIA / Animotive',v:'watch',comp:6.5,sc:[7,3,9,4,7,10],bgc:'#76B900',co:'NVIDIA. Kimodo is a free Fab plugin for UE5 Sequencer. Kinematic motion diffusion model trained on optical motion capture data. Text-to-animation generation retargeted directly onto characters. Compatible with MetaHuman and standard UE skeletal rigs. Self-hosted or Animotive Cloud.',desc:'Text-to-animation generation for UE5. Describe motion in natural language and Kimodo generates skeletal animation retargeted to your character rig. Kinematic motion diffusion model trained on optical mocap data produces physically plausible motion. Works directly in UE5 Sequencer. Compatible with MetaHuman and standard skeletal rigs. Free Fab plugin with no licensing cost. Self-hosted inference or Animotive Cloud option.',ev:'NVIDIA-backed technology. Available as free plugin on the Fab marketplace. Very early-stage with no confirmed shipped game. The text-to-animation approach is genuinely novel for rapid prototyping of animation sequences, combat idle variations, and NPC ambient behaviours.',rat:'WATCH. Free and architecturally elegant but too new for production reliance. Best use case: rapid prototyping of animation sequences before hand-keying or mocap capture. Zero cost, zero risk to evaluate. Monitor for production evidence and quality improvements.',cpre:'$0',cpost:'$0',founded:'2025 (Kimodo)',emp:'~30,000+ (NVIDIA)',fund:'Public ($3T+ mkt cap)',url:'fab.com'},

// ── ART PIPELINE (7) ──
{d:'art',name:'Adobe Firefly Enterprise',vendor:'Adobe',v:'pilot',comp:7.0,sc:[7,7,9,4,8,6],bgc:'#E8375A',co:'Adobe Inc. (NASDAQ: ADBE). ~30,000 employees. ~$21B revenue FY2025. Training data exclusively licensed (Adobe Stock + public domain). IP indemnification confirmed for Enterprise tier: caps from $50K+. Indemnity voided if prompts designed to infringe IP or imitate trademarked styles.',desc:'Text-to-image generation with the cleanest training data provenance of any image generation tool. Enterprise tier includes IP indemnification. Firefly Foundry (Jan 2026) enables custom models trained on brand content (current partners are film/TV agencies, no game studios). For game studios: ideation and moodboarding ONLY. No character generation, no asset-specific prompts. All AI art is a reference equivalent to a photo or Pinterest board.',ev:'Forrester TEI (Adobe-commissioned): 70-80% asset variant increase, 65-75% review time reduction, from marketing enterprises. No game studio confirmed shipping with Firefly. The byte-punk aesthetic is distinctive; generic Firefly output will not match it without significant human refinement.',rat:'Strongest IP defence of any image generation tool. ~20-40% ideation time savings estimated for early moodboarding. PILOT: 3-5 volunteer artists (excluding anyone who objects), ideation only, 3 months. Voluntary participation is non-negotiable. AI moodboards are working documents that do not appear in art reviews or external presentations.',cpre:'~$14,400 (5 CC seats; may be $0 marginal)',cpost:'~$5,400/yr',founded:'2023 (Firefly); 1982 (Adobe)',emp:'~30,000',fund:'Public',url:'firefly.adobe.com'},
{d:'art',name:'Substance 3D AI',vendor:'Adobe (Allegorithmic)',v:'pilot',comp:7.2,sc:[7,6,9,7,9,5],bgc:'#E8375A',co:'Allegorithmic founded 2003, acquired by Adobe Jan 2019. Founder Sebastien Deguy left Adobe April 2025. AI features (Text to Texture, Text to Pattern, Image to Material) launched March 2024, Firefly-powered with licensed training data. Used by 95%+ of AAA studios.',desc:'AI features within the industry-standard texturing tool. Text to Texture generates PBR texture sets from text descriptions. Image to Material converts photographs into full PBR sets (albedo, normal, roughness, height). No new tool to learn: AI augments the existing Substance workflow artists use daily. Per-feature toggling available for individual artist opt-out.',ev:'Substance 3D (pre-AI): CDPR (Cyberpunk 2077), Naughty Dog (Uncharted 4), Ubisoft, EA. AI features specifically: no confirmed shipped game. Industry dominance means AI features are opt-in within a trusted tool. ~20-30% time savings on material iteration for environment surfaces (estimated).',rat:'Zero-friction adoption: features already embedded in the suite. Lower adoption risk than any standalone AI art tool. PILOT: all Substance users, 3 months, environment materials (stone, metal, wood, fabric). Do NOT use for character textures during pilot. Adobe increased Substance pricing 25% in March 2025; confirm current contract terms.',cpre:'$0 marginal',cpost:'$0 marginal',founded:'2003 (Allegorithmic)',emp:'~30,000 (Adobe)',fund:'Public',url:'adobe.com/products/substance3d'},
{d:'art',name:'Midjourney',vendor:'Midjourney Inc.',v:'watch',comp:5.9,sc:[9,7,3,3,5,7],bgc:'#2C2C54',co:'Midjourney Inc. Founded 2022, San Francisco. CEO David Holz (co-founder of Leap Motion). Self-funded, profitable. Estimated $200M+ ARR. ~50 employees. No VC funding taken.',desc:'The highest raw capability for image generation of any tool evaluated (Capability score: 9). Produces the most photorealistic and artistically sophisticated output in the market. Operates via Discord interface and web app. V6.1 introduced character consistency, style references, and inpainting. Widely considered the creative benchmark for AI image generation.',ev:'Used by thousands of studios for concept art and moodboarding. No game studio has publicly confirmed shipping with Midjourney-derived assets. Training data provenance has unsettled litigation: Midjourney faces copyright challenges analogous to Getty Images v. Stability AI. No IP indemnification offered.',rat:'WATCH. IP/Legal Safety score of 3 blocks PILOT under the sensitivity floor rule. Highest capability of any image generation tool, but training data provenance and lack of indemnification create unacceptable legal risk for a studio approaching Series B. Revisit Q1 2027 if IP litigation resolves and the company offers commercial indemnification.',cpre:'$0',cpost:'$0',founded:'2022',emp:'~50',fund:'Self-funded',url:'midjourney.com'},
{d:'art',name:'Houdini ML Features',vendor:'SideFX',v:'watch',comp:6.9,sc:[7,5,9,7,8,5],bgc:'#FF6B35',co:'SideFX. Founded June 1987, Toronto. CEO Kim Davidson (founder, 39 years). ~171-220 employees. ~$2.78M raised (Epic minority investor Nov 2020). Essentially self-funded and profitable for three decades. One of the most stable companies in the industry.',desc:'ML features within the industry-standard procedural content tool: ONNX SOP (run any neural network inside Houdini\'s node graph), ML Volume Upres (AI upscaling for fluid/smoke simulations, 10-50x speedup), ML Deformer (real-time approximation of complex simulations), Neural Point Surface (neural implicit surface reconstruction). All run locally on GPU with zero data egress. These are technical processing tools, not creative AI generation.',ev:'Houdini (pre-ML): industry standard for procedural content and VFX: Horizon Zero Dawn, Spider-Man: Miles Morales, God of War Ragnarok, Forza Horizon 5, Pacific Drive. ML features specifically: no confirmed shipped game (features too new; arrived 2023-2025). SideFX demos show 10-50x speedup for simulation upscaling.',rat:'WATCH, but not because of quality concerns. ML features are genuinely useful but too new for any studio to have shipped with them. Zero additional cost (included in existing Houdini licence). Zero vendor risk (39-year-old profitable company). Artists can experiment opportunistically without formal PILOT. Upgrade to PILOT when a shipped game confirms production viability. Candidates: ML Volume Upres for zone VFX, ML Deformer for real-time combat effects.',cpre:'$0 marginal',cpost:'$0 marginal',founded:'1987',emp:'~171-220',fund:'~$2.78M (self-funded)',url:'sidefx.com'},
{d:'art',name:'Scenario',vendor:'Scenario.com',v:'watch',comp:6.2,sc:[7,7,6,4,5,7],bgc:'#7C3AED',co:'Scenario. Founded ~2021. $6M seed (Play Ventures). ~15-30 employees. Trains custom generative models on a studio\'s existing art so output matches established character designs, textures, UI treatments, and promotional styles rather than producing generic AI aesthetics.',desc:'AI-powered asset generation platform built for game developers. The key differentiator: custom model training on a studio\'s own artwork produces style-consistent output rather than generic AI. Supports image, video, 3D, and audio generation with production-ready export. Includes inpainting, upscaling, live-paint rendering from sketches, texture baking for PBR workflows, and reskinning tools. Pricing: Free/Starter $15/Pro $45/Max $75/Enterprise $125+/user.',ev:'Ubisoft (10,000+ assets for Captain Laserhawk). InnoGames. Tripledot Studios (2,500+ staff). Mad Brain Games (11 shipped titles). Strongest production evidence among AI art generation tools outside Firefly. Primarily 2D art generation optimised for mobile/casual; no confirmed 3D pipeline or UE5 integration for MMO-scale production.',rat:'WATCH for a UE5 MMO studio. Strong tool for 2D art at mobile/casual scale, but the studio\'s bottleneck is 3D assets and textures inside the engine, not 2D illustrations. Custom model training on studio art is the right approach conceptually. Revisit if Scenario adds 3D pipeline capabilities, native UE5 integration, or demonstrates use at MMO scale.',cpre:'$0',cpost:'$0',founded:'~2021',emp:'~15-30',fund:'$6M seed',url:'scenario.com'},
{d:'art',name:'Meshy',vendor:'Meshy.ai',v:'watch',comp:4.9,sc:[6,4,5,2,5,8],bgc:'#06B6D4',img:'https://cdn.meshy.ai/ti_w:3840,q:75/landing-assets/home/meshy-use-case-game-development.webp',co:'Founded ~2022. $15M ARR (Nov 2025), growing rapidly. Meshy 6: generates textured, rigged 3D models with PBR maps, up to 600K face meshes. Pro $20/mo, Studio $60/mo.',desc:'AI 3D model generation from text or image prompts. Produces textured, rigged models with PBR maps. Primarily useful for blockout, prototyping, and visual development. Current output requires substantial cleanup (retopology, UV unwrapping, material assignment) for production use in a UE5 MMO. The quality gap between AI-generated and artist-authored 3D models remains significant at AAA-adjacent quality bars.',ev:'No shipped AAA game. Indie and game-jam adoption confirmed. GDC 2025 exhibitor. Rapid revenue growth ($15M ARR) but user base is overwhelmingly prototypers, content creators, and indie developers. No UE5 MMO or AA/AAA citation.',rat:'WATCH. Team Adoption score of 2 is the primary blocker: introducing AI-generated 3D assets risks triggering friction in any art team with strong craft culture. IP/Legal at 5: training data provenance unclear, no indemnification. Quality gap: cleanup time may negate generation speed for production-quality UE5 assets. Revisit Q1 2027 if output quality reaches AAA standard and IP provenance improves.',cpre:'$0',cpost:'$0',founded:'~2022',emp:'~30-50',fund:'Undisclosed',url:'meshy.ai'},
{d:'art',name:'Rodin',vendor:'Hyper3D (Deemos)',v:'watch',comp:6.3,sc:[9,6,5,3,7,7],bgc:'#8B5CF6',co:'Deemos Technologies Inc. Founded 2020, incubated at ShanghaiTech University. HQ Shanghai with US presence (San Francisco/LA). Series A co-led by ByteDance and Meituan\'s DragonBall Capital (Jan 2025, "tens of millions of dollars"). SIGGRAPH 2025 Best Paper Award.',desc:'The highest-quality AI 3D generation available. Gen-2 model produces game-ready meshes with quad topology, 4K PBR texture maps (albedo, normal, roughness, metallic), in GLB, FBX, OBJ, USDZ, or STL format. Specialises in characters, creatures, and humanoid figures where topology quality is unmatched. Not recommended for mechanical modelling. Generates in ~4 seconds. API via fal.ai at $0.40/generation. Subscription: Creator $30/mo, Business $120/mo (API access requires Business tier). Free tier: 10 one-time credits.',ev:'Lowe\'s: NVIDIA case study confirms Rodin generated 30,000+ item 3D asset catalogue at under $1/model. NetEase Eggy Party: collaboration on real-time 3D generation (partially verified via 80.lv). "Trusted By" logos on website: Supercell, NVIDIA, Tencent, Meta, Google DeepMind, Shutterstock. SIGGRAPH 2025 Best Paper, Blender Development Fund Gold Sponsor. No confirmed shipped game crediting Rodin-generated final assets.',rat:'WATCH. Premium quality for character/creature prototyping. The Lowe\'s case study (via NVIDIA) is the strongest independently verified production use. ByteDance is an investor, not a confirmed production user. China-headquartered (Shanghai) raises data sovereignty concerns for game IP. Evaluate for NPC character concepting where topology quality matters. ~11-50 employees, still early-stage despite funding.',cpre:'$0',cpost:'$0',founded:'2020',emp:'~11-50',fund:'Series A (tens of millions)',url:'hyper3d.ai'},
{d:'art',name:'Sloyd',vendor:'Sloyd',v:'watch',comp:6.3,sc:[7,5,7,5,6,8],bgc:'#14B8A6',co:'Sloyd. Founded 2021, Oslo. EUR 3M seed (a16z SPEEDRUN, Antler, Autodesk strategic investor). CTO Oyvind Soroy ex-EA. ~10-13 employees. AI-powered 3D creation combining parametric modelling with generative AI. Slider-based customisation gives artists control over output rather than black-box generation.',desc:'Generates customisable, game-ready 3D models from text prompts, images, or parametric templates. The Parametric Editor allows slider-based real-time customisation, giving artists direct control that purely generative tools lack. Produces clean topology, UV maps, and multiple levels of detail for immediate engine use. Exports GLB format compatible with Unity and UE5. Unity plugin available now; Unreal plugin coming. Pricing: Plus $15/mo, Pro $50/mo. 30 free exports on starter tier.',ev:'300K+ signups but zero named studio confirmed in production. Adopted by indie developers and prototyping teams. No AAA game citation. The parametric approach reduces the "black box" problem: artists can adjust proportions, details, and style with sliders rather than re-prompting. This may face less art team resistance than purely generative tools since it preserves artist agency.',rat:'WATCH. The most artist-friendly approach to AI 3D generation. Parametric sliders reduce the "AI replaces artists" concern. Game-ready optimisation (clean topology, UV maps, LODs) is stronger than Meshy or Tripo. UE5 plugin not yet available (Unity only). Lower output fidelity than Rodin for characters. Best suited for props and environmental objects where parametric control adds value.',cpre:'$0',cpost:'$0',founded:'2021',emp:'~10-13',fund:'EUR 3M seed',url:'sloyd.ai'},
{d:'art',name:'Tripo3D',vendor:'Tripo',v:'watch',comp:5.6,sc:[7,5,5,3,6,8],bgc:'#6366F1',co:'Tripo. Backed by $50M in funding from Alibaba and Baidu Ventures. 6.5M+ creators, 90,000+ developers, nearly 100M 3D models generated. Algorithm 3.1 engine with 200B+ parameters.',desc:'AI 3D model generation from text and images. Algorithm 3.1 delivers clean quad-based topology, semantic part segmentation, and editable PBR materials. Supports USD, FBX, OBJ, STL, GLB, 3MF export. Automatic rigging, retopology optimisation, low-poly generation, and PBR material baking. Cloud workspace collaboration and batch generation of environmental props. More technically mature than Meshy with stronger topology and material quality.',ev:'6.5M+ creators and 90,000+ developers. Nearly 100M 3D models generated across the platform. No confirmed AAA game shipped with Tripo-generated assets. Primarily used by indie developers for placeholder assets and environment blocking. Unity and Unreal Engine integration supported.',rat:'WATCH. More technically capable than Meshy (quad topology, semantic segmentation, rigging) and better funded ($50M vs undisclosed). But same fundamental barriers apply: art team resistance to AI-generated 3D (Adoption score 3), unclear training data provenance (IP/Legal 5), China-headquartered backing (Alibaba, Baidu) raises data sovereignty concerns for game IP. Professional plan $19.90/mo. Free plan does not support commercial use. Revisit alongside Meshy at Q1 2027.',cpre:'$0',cpost:'$0',founded:'~2023',emp:'~50-100',fund:'$50M',url:'tripo3d.ai'},
{d:'art',name:'Promethean AI',vendor:'Promethean AI',v:'watch',comp:6.0,sc:[6,4,8,4,7,8],bgc:'#4ADE80',co:'Founded 2018 by Andrew Maximov (former Technical Art Director at Naughty Dog; Uncharted 4, The Last of Us Part II). Los Angeles. CRITICAL: 3 employees, $300K total funding (Disney Accelerator 2024). Micro-startup.',desc:'AI-assisted 3D environment layout from natural language. Describe a scene in text; Promethean AI places, arranges, and styles environment assets. UE5 plugin, Unity, Maya, Blender integration. The concept is compelling for an MMO with large open-world zones to populate. Claims "10,000+ users including PlayStation Studios" but no specific studio, game, or named user independently verified.',ev:'No named studio has confirmed shipping a game with Promethean AI despite 6+ years of existence and a Disney Accelerator stint. Only founder quotes and unattributed website testimonials found. Maximov\'s Naughty Dog pedigree lends credibility to the technical approach, but production evidence is absent. Pricing: Free (individuals) / Indie $19.99/mo / Pro $59.99/mo.',rat:'WATCH. Compelling concept but critical company risk: 3 employees and $300K total funding is extremely fragile. A single departure (the founder) ends the company. No enterprise support guarantee. No production evidence. Revisit Q2 2027 if the company raises substantial funding or is acquired, AND a named studio ships with the tool.',cpre:'$0',cpost:'$0',founded:'2018',emp:'3',fund:'$300K',url:'prometheanai.com'},
{d:'art',name:'Tractive',vendor:'Tractive',v:'watch',comp:5.5,sc:[7,2,8,3,6,7],bgc:'#059669',co:'Tractive. a16z Speedrun backed. Founded by Mohsan Alvi. Pre-release/early access. Collaborators: Rocksteady, Supercell, Jagex.',desc:'The first dedicated AI model for 3D retopology. Converts high-poly sculpts into clean, production-ready topology using ML rather than traditional algorithmic approaches. Retopology is one of the most time-consuming steps in the 3D asset pipeline, typically taking hours per model. Tractive aims to reduce this to minutes while preserving edge flow quality. Non-generative: it does not alter your sculpt or style. Pre-release with early access for select studios.',ev:'Collaborators include Rocksteady (Batman: Arkham series), Supercell (Clash of Clans, Brawl Stars), and Jagex (RuneScape). a16z Speedrun backing provides credibility and runway. Pre-release: no shipped game, no public pricing.',rat:'WATCH. The most credible ML retopology tool identified. The collaborator list (Rocksteady, Supercell, Jagex) suggests genuine AAA interest. Pre-release with no pricing, no public access timeline, and no production evidence. The 3D art pipeline has no incumbent AI retopology tool, making this a genuine gap-filler if it delivers. Monitor for public release.',cpre:'$0',cpost:'TBD',founded:'~2023',emp:'Undisclosed',fund:'a16z Speedrun',url:'tractive.ai'},

// ── AUDIO (4) ──
{d:'audio',name:'Wwise Similar Sound Search',vendor:'Audiokinetic (Sony)',v:'pilot',comp:7.8,sc:[8,6,9,8,9,7],bgc:'#00A6ED',co:'Audiokinetic. Founded 2000, Montreal. Acquired by Sony Interactive Entertainment 2020. ~200+ employees. Sound Search co-developed with Sony AI research division. Trained on BOOM Library + Pro Sound Effects (licensed, not scraped).',desc:'AI-powered audio search within Wwise: audio-to-audio similarity ("find sounds like this one") and text-to-audio description ("whooshing sword impact with reverb"). Included in Wwise 2025.1+ at no additional cost. SFX search only, no voice generation. Reduces search-to-selection cycle from minutes to seconds per effect.',ev:'Wwise: industry standard (Assassin\'s Creed, Cyberpunk 2077, Destiny 2, Hogwarts Legacy). Sound Search is new (2025.1); ships as part of standard product. Wwise licensing: free under $250K project budget; Pro from $8K or Premium from $25K.',rat:'~30-50% faster SFX discovery. Conditional on Wwise middleware selection. PILOT: entire audio team, 3 months, 100+ SFX queries. Zero SAG-AFTRA/Equity concern (SFX search, not voice). Zero additional cost. Upgrade path to ADOPT after 3-month pilot if confirmed.',cpre:'$0 marginal',cpost:'$0 marginal',founded:'2000',emp:'~200+',fund:'Sony subsidiary',url:'audiokinetic.com'},
{d:'audio',name:'ElevenLabs Sound Effects',vendor:'ElevenLabs',v:'pilot',comp:5.9,sc:[6,4,7,6,5,8],bgc:'#1A1A2E',img:'https://eleven-public-cdn.elevenlabs.io/payloadcms/yfzxw4iha5-eleven-creative.webp',co:'ElevenLabs. Founded 2022. ~$781M raised across five rounds. $500M Series D (Feb 2026) at $11B valuation, led by Sequoia. ~$330-500M ARR. Extremely well-funded. Separate SAG-AFTRA agreement for voice product.',desc:'Text-to-SFX generation: 48kHz output, seamless looping, 38 categories. This is the sound effects product, NOT voice cloning. SFX only. The SFX product does not involve voice performance. Integrated into Scenario.gg and Layer.ai creative pipelines. Pricing: Starter $5/mo, Creator $22/mo, Pro $99/mo, Scale $330/mo.',ev:'No shipped game confirmed. SFX product newer than core voice technology. Limited game-specific adoption. AI-generated SFX may produce reference-quality vs production-quality output; the PILOT will establish whether any output meets the quality bar for shipped byte-punk audio.',rat:'Rapid SFX prototyping tool. PILOT: 1 Pro seat, 3 months, 30+ prototype SFX. Audio lead reviews all output before any shipped use. Generic SFX descriptions only in prompts (no partner IP, faction names, or lore). Adjust to Starter ($5/mo) if output is reference-only.',cpre:'~$2,376',cpost:'~$1,188/yr',founded:'2022',emp:'~200+',fund:'~$781M',url:'elevenlabs.io'},
{d:'audio',name:'AIVA',vendor:'AIVA Technologies',v:'watch',comp:5.3,sc:[5,4,6,5,5,8],bgc:'#6366F1',co:'AIVA Technologies. Founded 2016, Luxembourg. Recognised by SACEM (Luxembourg Society of Authors) as a composer. AI orchestral and cinematic music composition in 250+ styles.',desc:'AI music composition with MIDI and WAV export. Generates orchestral, cinematic, and ambient music. Style training available on Pro tier. Can produce adaptive music stems for game integration. Free tier: AIVA retains copyright. Standard EUR 15/mo. Pro EUR 49/mo (5 seats, full copyright ownership). Music quality is adequate for prototyping but not for a distinctive game soundtrack.',ev:'Pixelfield (Epic Stars, 2017): first AI game soundtrack. This citation is 9 years old and obscure. No recent game production usage found. Widely used by content creators and small studios for background music, but not by AAA or MMO studios for distinctive soundtracks.',rat:'WATCH. Could serve as a reference tool for a human composer (generating harmonic sketches, exploring tempo variations), but cannot produce a distinctive byte-punk soundtrack. Hire a composer. The copyright situation is nuanced: only Pro tier grants full ownership. At EUR 49/mo, affordable as a sketching tool if a composer finds it useful.',cpre:'$0',cpost:'$0',founded:'2016',emp:'~15-25',fund:'Undisclosed',url:'aiva.ai'},
{d:'audio',name:'Soundraw',vendor:'Soundraw Inc.',v:'avoid',comp:4.5,sc:[4,3,5,5,4,7],bgc:'#EF4444',co:'Founded February 2020, Tokyo. ~19-20 employees. ~$5.01M funding. 557,000+ creators on platform, overwhelmingly content creators, not game studios.',desc:'AI music generation with customisation (genre, mood, tempo, instruments). Produces generic background music. Training data sources undisclosed. No IP indemnification offered. The tool produces library-quality filler, not authored music.',ev:'NONE in games. Verified usage only in game jam entries. Game jam developers explicitly said they would "hire a real composer" for any commercial release. No game studio citation at any scale.',rat:'AVOID. Production Readiness score of 3 (no game use). IP provenance uncertain (training data sources undisclosed). No IP indemnification. Output quality is generic background music; a cosy byte-punk MMO with 5 faction-distinct musical identities requires authored music, not generated filler. The counterfactual cost of not using Soundraw is zero.',cpre:'$0',cpost:'$0',founded:'2020',emp:'~19-20',fund:'~$5.01M',url:'soundraw.io'},

{d:'audio',name:'Replica Studios',vendor:'Replica Studios',v:'watch',comp:7.0,sc:[8,7,7,5,9,5],bgc:'#E11D48',co:'Replica Studios. AI voice acting purpose-built for games, film, and interactive media. Holds the first SAG-AFTRA agreement for AI voice replicas in video games, announced at CES.',desc:'AI voice acting with native UE5 and Unity plugins enabling real-time voice preview inside development environments. Voice library curated for game archetypes (heroes, villains, NPCs). The SAG-AFTRA agreement enables studios to license digital voice replicas of professional actors with performer consent, fair rates, safe data storage, and usage transparency. Performers must consent for each new project; replicas have time-limited employment without further payment. Free tier available with restricted access.',ev:'First AI voice tool with a legitimate SAG-AFTRA licensing pathway for game development. The agreement addresses the core blocker that makes all other voice AI tools WATCH: union compliance. MetaHuman Creator integration (early access). No specific shipped game title confirmed publicly using Replica voices in final release.',rat:'WATCH. The SAG-AFTRA agreement is groundbreaking and changes the equation for AI voice acting in games. However, the agreement is SAG-AFTRA specific; UK Equity (relevant for a UK studio with UK actors) has parallel demands not yet addressed by Replica. Legal review required before any adoption. Voice performance AI remains the most sensitive category in this report. Evaluate only after SAG-AFTRA/Equity compliance framework is in place.',cpre:'$0',cpost:'$0',founded:'Undisclosed',emp:'Undisclosed',fund:'Undisclosed',url:'replicastudios.com'},
{d:'audio',name:'Resemble AI',vendor:'Resemble AI',v:'watch',comp:6.7,sc:[8,7,6,5,6,7],bgc:'#7C3AED',co:'Resemble AI. Custom voice cloning and synthetic voice generation. Chatterbox v1.0.0: 350-million parameter open-source speech model enabling zero-shot voice cloning from a short audio sample. Built-in deepfake detection and watermarking.',desc:'Professional voice cloning platform with zero-shot capability (generate speech in any voice from a short sample without fine-tuning). Flex pricing: $0.0005/synthesis second, voice clones $2-$5/month each, team seats $20/month per user. Open-source Chatterbox model available under permissive licence. Emotion control via prompts (happy, sad, angry). Deepfake detection built in for ethical safeguards.',ev:'Creative Assembly (Total War) and Krafton (PUBG, inZOI) confirmed as production users. This is the strongest production evidence of any voice AI tool evaluated, with named AAA studios using the technology in shipped or shipping titles. The open-source Chatterbox model enables self-hosted deployment for IP-sensitive content.',rat:'WATCH. Strongest production evidence among voice AI tools (Creative Assembly, Krafton). The open-source Chatterbox model enables self-hosted inference, eliminating cloud data egress for sensitive character voice work. Same SAG-AFTRA/Equity compliance requirements as all voice AI tools. The self-hosted option is architecturally significant: voice data stays on studio infrastructure. Evaluate alongside Replica Studios when compliance framework is in place.',cpre:'$0',cpost:'$0',founded:'Undisclosed',emp:'Undisclosed',fund:'Undisclosed',url:'resemble.ai'},

// ── CINEMATICS (1 + overview mentions) ──
{d:'cinematics',name:'Seedance 2.0',vendor:'ByteDance',v:'watch',comp:5.8,sc:[8,4,6,5,4,6],bgc:'#FF0050',co:'ByteDance (TikTok parent). Seedance launched June 2025; v2.0 released February 2026. API available via fal since April 2026. Multimodal: accepts text, image, audio, and video inputs.',desc:'AI video generation producing cinematic output with native audio, multi-shot cuts, and realistic physics in a single generation. Standard tier generates 1080p; Fast tier for rapid iteration. Studio-friendly: includes a real-time IP scanning engine that compares generated frames against a database of protected intellectual property, automatically flagging content that infringes copyrights. The first AI video generator to include built-in IP protection. Director-level camera control for shot composition.',ev:'Game studios using Seedance 2.0 to prototype cinematic trailers, previsualize cutscenes, and reduce preproduction costs. No game has shipped cinematics created with Seedance. The tool is <4 months old as an API. Competitors: Runway Gen-4.5 (strongest character consistency, reference image support), Kling 3.0 (Kuaishou; multi-shot narrative coherence, native 4K, storyboard tools).',rat:'WATCH. Genuine value for cutscene previsualization and trailer concepts before committing to full UE5 Sequencer production. But: ByteDance is China-headquartered (data sovereignty concern for game IP), no game has shipped with AI-generated video, and UE5 real-time cinematics are the production standard. Use for internal ideation only. Never input partner IP, unreleased content, or narrative spoilers.',cpre:'$0',cpost:'$0',founded:'2025 (Seedance); 2012 (ByteDance)',emp:'~100,000+ (ByteDance)',fund:'Private',url:'fal.ai/seedance-2.0'},

{d:'cinematics',name:'Autodesk Flow Studio',vendor:'Autodesk',v:'watch',comp:7.4,sc:[8,7,8,6,8,7],bgc:'#00BFA5',co:'Autodesk (NASDAQ: ADSK). Formerly Wonder Dynamics (acquired May 2024). Cloud-based AI VFX and animation platform. Pro tier included in Autodesk Media & Entertainment Collection at no additional cost. Free tier available.',desc:'AI-powered VFX pipeline automating motion capture, camera tracking, lighting, and CG character composition into live-action scenes. Wonder 3D Gen model (March 2026) adds text-to-3D, image-to-3D, and text-to-image generation. Exports motion capture data, camera tracking, alpha masks, clean plates, and character passes in USD format compatible with Maya, Blender, UE5, and 3ds Max. Credit-based system with free tier for exploration.',ev:'Autodesk backing provides enterprise stability unmatched by any other tool in the cinematics category. Growing adoption across film, broadcast, and virtual production. No specific game studio shipping citation found. The AI VFX automation is primarily designed for film/TV workflows but the motion capture and 3D generation outputs are directly usable in game pipelines.',rat:'WATCH. The Autodesk acquisition transforms this from a startup risk to an enterprise-backed tool. Free tier enables zero-risk evaluation. The combination of AI mocap + 3D generation + VFX compositing in one platform is unique. For game cinematics previz: capture actor performances via video, generate placeholder 3D assets, composite CG characters, all without specialised VFX infrastructure. Evaluate for cutscene and trailer previz pipeline.',cpre:'$0',cpost:'$0',founded:'2024 (Flow Studio); 1982 (Autodesk)',emp:'Public company',fund:'Public (NASDAQ: ADSK)',url:'wonderdynamics.com'},

// ── ENGINEERING (2) ──
{d:'engineering',name:'Aura',vendor:'Ramen VR',v:'pilot',comp:6.5,sc:[8,4,7,5,9,6],bgc:'#7C3AED',co:'Ramen VR. Founded 2019, San Francisco. YC S19. $40M+ raised (Series B $35M, 2022, led by Anthos + Dune). Pivoted from Zenith VR MMO (ceased July 2024) to AI developer tools. ~15-20 employees after layoffs. Head of AI: Hisham Bedri (ex-CTO One More Multiverse). Windows only.',desc:'UE5-native AI agent (5.3-5.7): generates/edits Blueprint graphs and C++ code, creates 3D assets and audio within the editor. Telos 2.0: proprietary Blueprint reasoning on Anthropic Claude, claims >99% accuracy reading existing graphs and 25x error reduction over generic LLMs (self-benchmarked, no independent validation). Dragon Agent runs autonomous agentic loops. March 2026 acquired Coplay (added Unity). Credit-based pricing: Pro $40/mo, unused credit does not roll over.',ev:'Sinn Studio (Zombonks, VR early access, "shipped in 5 months"). Unreal University: "sophisticated starting point rather than a complete solution." Forum issues: plugin install failures on UE 5.7, Blueprint editing refused, DLL-only distribution (no source). StraySpark: "genuinely excels at Blueprint work" but concerns about proprietary, closed-source nature.',rat:'Only UE5-native AI coding agent with Blueprint reasoning. Thin production evidence is the primary risk (one small VR indie, tool <6 months old). PILOT: 2-3 Pro seats, 3 months, Blueprint generation for gameplay systems (combat abilities, NPC behaviours, UI). Track accepted-output rate (target: >40%). Do not use for zone architecture or server infrastructure during PILOT.',cpre:'~$2,880',cpost:'~$1,440/yr',founded:'2019',emp:'~15-20',fund:'$40M+',url:'tryaura.dev'},
{d:'engineering',name:'UE CoPilot',vendor:'BlueprintsLab',v:'watch',comp:5.6,sc:[6,2,7,5,8,7],bgc:'#3B82F6',co:'BlueprintsLab, a solo Finnish developer ("Roly"/"Robert"). Gmail contact, no LinkedIn, no company registration found. Other FAB products: Blueprint Analyst ($44.99), Ultimate Difficulty Scaling ($34.99). Price: $330, increasing monthly.',desc:'UE5 plugin (5.4-5.7, Windows + macOS) with 1,050+ tool actions across 56 categories. Full C++ source included. LLM integration layer with 9 API slots (OpenAI, Anthropic, Google, DeepSeek, Mistral). Covers Blueprint generation, code review, debugging, asset management. Initially "Ultimate Blueprint Generator" (July 2025), V1.0 April 2026.',ev:'No named studio. No shipped game. "Thousands of developers" unsubstantiated. All press releases are paid ABNewswire wire distributions. Strongly negative user report (willfitch, April 2026): alleged MCP integrations don\'t work, token consumption "about 20x what Claude and Codex would use" (1.2M tokens for one Blueprint update), user banned from Discord for reporting issues. No Reddit or independent YouTube reviews exist.',rat:'WATCH. Production Readiness of 2 triggers sensitivity floor (code is a shipped asset). Solo developer risk, zero production evidence, credibility concerns (paid press releases, self-published comparison blogs, escalating prices, user complaint about 20x token consumption and Discord banning). Revisit Q1 2027 if a named studio ships and concerns are addressed publicly.',cpre:'$0',cpost:'$0',founded:'~2024',emp:'1',fund:'Self-funded',url:'fab.com/listings/c65e1f6c-eb85-40c1-bb28-14d55d25f498'},

{d:'devops',name:'TeamCity AI Build Analyzer',vendor:'JetBrains',v:'watch',comp:5.6,sc:[6,5,9,3,4,4],bgc:'#087CFA',co:'JetBrains. Private, founded 2000, Prague. Makers of IntelliJ IDEA, WebStorm, Rider. One of the most stable developer tooling companies. TeamCity 2026.1 (May 2026). AI features powered by GPT-4.1.',desc:'AI build failure analysis: reads failed build logs, provides root cause summary and fix suggestions. AI Assistant: chat-based Q&A connected to TeamCity docs. MCP Endpoint (GA): built-in MCP server exposing build log retrieval, REST GET, and build trigger to external AI agents. TeamCity CLI (GA): 60+ commands with AI agent integration. AI features still in Early Access Programme; Enterprise licence required. Cloud $45/active user/mo; On-prem from $2,399/year.',ev:'No named game studio case study for AI features. TeamCity (pre-AI) used in game dev with dedicated UE5 and Unity plugins and Perforce integration, but not market leader for game builds (Jenkins and GitHub Actions/BuildKite more common). The MCP Endpoint is the most architecturally interesting feature: enables Claude/Codex to interact with CI/CD data without vendor lock-in.',rat:'WATCH. AI features in Early Access. MCP Endpoint and CLI (both GA) are architecturally sound for external AI agent integration. Revisit when: (a) AI Build Analyzer reaches GA, (b) CI/CD platform decision made, (c) 3-6 months of platform stability achieved. If TeamCity selected, AI features evaluate for PILOT.',cpre:'$0',cpost:'$0',founded:'2000',emp:'~2,000+',fund:'Private (profitable)',url:'jetbrains.com/teamcity'},

{d:'gamedesign',name:'Machinations',vendor:'Machinations.io',v:'pilot',comp:7.8,sc:[8,8,9,7,4,9],bgc:'#FF6B2B',co:'Machinations.io. Visual game economy simulation. Founded ~2012. ~20-30 employees. Undisclosed funding. Free tier for 1 seat; paid tiers for teams.',desc:'Model currency flows, sink/faucet ratios, progression curves, and monetisation balance visually before building. Critical for an MMO with subscription + cosmetics marketplace + in-game currency stipend. Borderline AI criterion (simulation, not ML) but the best tool for this problem. No AI alternative exists for game economy modelling.',ev:'Ubisoft, Gameloft (34% production time reduction), Wargaming, King. Strongest production evidence of any PILOT tool in this entire report. Amazon Games also listed as customer. The tool has been adopted by the studios most known for live-service economy management.',rat:'Highest-evidence PILOT. Directly addresses the #1 game design risk: MMO economy complexity. Simulate currency flows, test monetisation balance, identify sink/faucet gaps before a line of code is written. PILOT: 2-3 designers, 3 months, model core economy loops (currency generation, cosmetics marketplace, subscription stipend).',cpre:'~$1,200-$3,480',cpost:'~$720-$2,160/yr',founded:'~2012',emp:'~20-30',fund:'Undisclosed',url:'machinations.io'},
{d:'gamedesign',name:'Ludo.ai',vendor:'Ludo.ai',v:'pilot',comp:6.7,sc:[5,7,8,7,6,8],bgc:'#4F46E5',co:'Ludo.ai. AI game research and market analysis. Founded ~2020. ~10-15 employees. Undisclosed funding.',desc:'AI-powered game market research: competitive analysis, trend tracking, concept validation, GDD generation. Supplements (never replaces) deep manual research with data-driven market intelligence and structured competitive insights.',ev:'Rovio, Ubisoft, Voodoo, SayGames, Homa, Garena. Clean evidence across mobile and mid-tier studios. Passes all evaluation criteria.',rat:'Low-cost research supplement. Provides structured competitive intelligence and trend data that manual research takes days to compile. PILOT: design team, 3 months, evaluate depth vs manual research for the cosy byte-punk MMO competitor landscape.',cpre:'~$1,200-$1,800',cpost:'~$480/yr',founded:'~2020',emp:'~10-15',fund:'Undisclosed',url:'ludo.ai'},
