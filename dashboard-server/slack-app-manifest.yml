display_information:
  name: WorkSage
  description: Submit tasks to the NBI WorkSage dashboard queue by mentioning @WorkSage in any channel.
  background_color: "#1e293b"

features:
  bot_user:
    display_name: WorkSage
    always_online: true

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - chat:write
      - im:history
      - groups:history
      - mpim:history
      - users:read

settings:
  event_subscriptions:
    request_url: https://worksage.nbi-consulting.com/api/slack/events
    bot_events:
      - app_mention
      - message.im
      - message.groups
      - message.mpim
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
