display_information:
  name: WorkSage
  description: Create tasks in WorkSage from any Slack conversation.
  background_color: "#1e293b"

features:
  bot_user:
    display_name: WorkSage
    always_online: true
  slash_commands:
    - command: /worksage
      url: https://worksage.nbi-consulting.com/api/slack/command
      description: Create a task in WorkSage
      usage_hint: "[client] [person] what needs doing"
      should_escape: false

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - chat:write
      - im:history
      - groups:history
      - mpim:history
      - users:read

settings:
  event_subscriptions:
    request_url: https://worksage.nbi-consulting.com/api/slack/events
    bot_events:
      - app_mention
      - message.im
      - message.groups
      - message.mpim
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
